<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & Tasks System</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0;}
.container { max-width:1400px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
.sidebar { float:left; width:220px; background:#222; color:#fff; min-height:100vh; padding-top:20px; }
.sidebar button { display:block; width:90%; margin:10px auto; padding:10px; border:none; border-radius:5px; background:#333; color:#fff; cursor:pointer; text-align:right;}
.sidebar button.active { background:#007bff; }
.content { margin-left:240px; padding:20px; }
.header { text-align:center; margin-bottom:20px; }
.header img { height:100px; width:auto; margin-bottom:10px; }
.developer, .phone { text-align:center; font-size:14px; margin:2px 0; color:#555; }
input, select, button { padding:8px; margin:5px 0; width:100%; box-sizing:border-box; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:120px; }
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#222; color:#fff; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:100px;}
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; padding:15px; border-radius:10px; display:none; z-index:999; }
/* Task colors */
.task-offer { background:#ffeeba; }
.task-follow { background:#cce5ff; }
.task-supply { background:#d4edda; }
</style>
</head>
<body>

<div id="notification"></div>

<div class="sidebar">
<button class="active" onclick="showTab('crmTab', this)">CRM</button>
<button onclick="showTab('tasksTab', this)">Tasks</button>
</div>

<div class="content">
<div class="header">
<img src="logo.png" alt="Company Logo">
<div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>
</div>

<!-- CRM -->
<div id="crmTab" class="tab-content active">
<h2>CRM System</h2>
<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>
<button onclick="addOrUpdateClient()">💾 حفظ</button>
<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>

<!-- Tasks -->
<div id="tasksTab" class="tab-content" style="display:none;">
<h2>Tasks</h2>
<div class="row">
<input id="taskClient" placeholder="اسم العميل">
<input id="taskText" placeholder="نص المهمة">
<select id="taskType">
<option value="offer">تقديم عرض سعر</option>
<option value="follow">متابعة عرض السعر</option>
<option value="supply">أمر توريد</option>
</select>
<button onclick="addOrUpdateTask()">➕ إضافة / تعديل</button>
</div>
<ul id="taskList"></ul>
</div>

</div>

<script>
/* Tabs */
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
document.getElementById(id).style.display='block';
document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

/* Notification */
function showNotification(msg){
const n = document.getElementById("notification");
n.innerText = msg;
n.style.display="block";
setTimeout(()=> n.style.display="none", 3000);
}

/* CRM */
let clients = JSON.parse(localStorage.getItem("clients")||"[]");
let editClientIndex = -1;

function addOrUpdateClient(){
const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const date = document.getElementById("date").value;
const status = document.getElementById("status").value;
const notes = document.getElementById("notes").value;
const reminder = document.getElementById("reminderDays").value;

if(!name || !phone){ alert("⚠️ أدخل البيانات"); return; }

const clientData = {name, phone, date, status, notes, reminder};

if(editClientIndex===-1){ clients.push(clientData); }
else { clients[editClientIndex]=clientData; editClientIndex=-1; }

localStorage.setItem("clients", JSON.stringify(clients));

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
document.getElementById("status").value="Interested";
document.getElementById("notes").value="";
document.getElementById("reminderDays").value="";

renderClients();
}

function editClient(i){
const c=clients[i];
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
document.getElementById("date").value=c.date;
document.getElementById("status").value=c.status;
document.getElementById("notes").value=c.notes;
document.getElementById("reminderDays").value=c.reminder;
editClientIndex=i;
showNotification("✏️ تعديل العميل");
}

function deleteClient(i){ clients.splice(i,1); localStorage.setItem("clients",JSON.stringify(clients)); renderClients(); }

function openWhatsApp(phone){ window.open(`https://wa.me/${phone}`,'_blank'); }

function renderClients(){
const table=document.getElementById("clientTable"); table.innerHTML="";
let holdCount=0;
clients.forEach((c,i)=>{
let rowClass=c.status==="Hold"?"holdRow":"";
if(c.status==="Hold") holdCount++;
table.innerHTML+=`<tr class="${rowClass}">
<td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td>
<td>${c.notes}</td><td>-</td>
<td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
<td><button onclick="editClient(${i})">✏️</button></td>
<td><button onclick="deleteClient(${i})">❌</button></td>
</tr>`;
});
document.getElementById("total").innerText="Total: "+clients.length;
document.getElementById("hold").innerText="Hold: "+holdCount;
}

/* Tasks */
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");
let editTaskIndex=-1;

function addOrUpdateTask(){
const client=document.getElementById("taskClient").value.trim();
const text=document.getElementById("taskText").value.trim();
const type=document.getElementById("taskType").value;
if(!client || !text){ alert("أدخل البيانات"); return; }

const taskData={client,text,type};

if(editTaskIndex===-1) tasks.push(taskData);
else { tasks[editTaskIndex]=taskData; editTaskIndex=-1; }

localStorage.setItem("tasks",JSON.stringify(tasks));
document.getElementById("taskClient").value="";
document.getElementById("taskText").value="";
document.getElementById("taskType").value="offer";
renderTasks();
}

function editTask(i){
const t=tasks[i];
document.getElementById("taskClient").value=t.client;
document.getElementById("taskText").value=t.text;
document.getElementById("taskType").value=t.type;
editTaskIndex=i;
showNotification("✏️ تعديل المهمة");
}

function deleteTask(i){ tasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); }

function renderTasks(){
const list=document.getElementById("taskList"); list.innerHTML="";
tasks.forEach((t,i)=>{
let colorClass="";
if(t.type==="offer") colorClass="task-offer";
else if(t.type==="follow") colorClass="task-follow";
else if(t.type==="supply") colorClass="task-supply";

const li=document.createElement("li");
li.className=colorClass;
li.innerHTML=`${t.client} - ${t.text} <button onclick="editTask(${i})">✏️</button> <button onclick="deleteTask(${i})">❌</button>`;
list.appendChild(li);
});
}

/* Initial render */
renderClients();
renderTasks();
</script>
</body>
</html>
