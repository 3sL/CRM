<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System Management For Utopia Trading And Export</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
.stats { display:flex; gap:10px; flex-wrap:wrap; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px;}
#map { height:300px; margin-top:10px;}
.holdRow { background:#fff3cd; }

.logo { height:200px; display:block; margin:auto; }
.developer { text-align:right; margin:10px 0; }
.phone { text-align:right; margin-bottom:10px; }

#notification {
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
padding:15px;
border-radius:10px;
display:none;
z-index:999;
font-weight:bold;
}
</style>

</head>

<body>

<div id="notification"></div>

<div class="container">

<img src="logo.png" class="logo">
<div class="developer">تم التطوير بواسطة Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 01222153415</div>

<h2 id="title">CRM System Management For Utopia</h2>
<button onclick="toggleLang()">🌐 عربي / English</button>

<div class="row">
<input id="name">
<input id="phone">
<input type="date" id="date">

<select id="status">
<option value="Interested">Interested</option>
<option value="In Progress">In Progress</option>
<option value="Hold">Hold</option>
<option value="Completed">Completed</option>
</select>

<input id="notes">
<input id="agent">
<input type="number" id="reminderDays">
</div>

<div class="row">
<button onclick="startTracking()">📍</button>
<button onclick="stopTracking()">⛔</button>
<button onclick="addOrUpdate()">💾</button>
</div>

<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">0</div>
</div>

<div id="map"></div>

<table>
<thead>
<tr>
<th id="thName"></th>
<th id="thPhone"></th>
<th id="thDate"></th>
<th id="thStatus"></th>
<th id="thNotes"></th>
<th>Reminder</th>
<th>WhatsApp</th>
<th>Location</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase (كما هو)
const firebaseConfig = {
  apiKey: "AIzaSyBug4T4JIrLRCv6dNm7vdSFMD-KFC6mI0g",
  authDomain: "crm-app-7733a.firebaseapp.com",
  projectId: "crm-app-7733a",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db,"clients");

// عناصر
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const agentEl=document.getElementById("agent");
const reminderEl=document.getElementById("reminderDays");
const table=document.getElementById("table");

let lang="ar";
let editId=null;

// 🌐 اللغة
window.toggleLang=()=>{
  lang = lang==="ar"?"en":"ar";
  updateUIText();
  render();
}

function updateUIText(){
  nameEl.placeholder = lang==="ar"?"اسم العميل":"Customer Name";
  phoneEl.placeholder = lang==="ar"?"رقم الهاتف":"Phone";
  notesEl.placeholder = lang==="ar"?"ملاحظات":"Notes";
  agentEl.placeholder = lang==="ar"?"اسم المندوب":"Agent";
  reminderEl.placeholder = lang==="ar"?"Reminder بالأيام":"Reminder Days";

  document.getElementById("thName").innerText = lang==="ar"?"الاسم":"Name";
  document.getElementById("thPhone").innerText = lang==="ar"?"الهاتف":"Phone";
  document.getElementById("thDate").innerText = lang==="ar"?"التاريخ":"Date";
  document.getElementById("thStatus").innerText = lang==="ar"?"الحالة":"Status";
  document.getElementById("thNotes").innerText = lang==="ar"?"ملاحظات":"Notes";

  statusEl.innerHTML = `
  <option value="Interested">${lang==="ar"?"مهتم":"Interested"}</option>
  <option value="In Progress">${lang==="ar"?"قيد التنفيذ":"In Progress"}</option>
  <option value="Hold">${lang==="ar"?"معلق":"Hold"}</option>
  <option value="Completed">${lang==="ar"?"مكتمل":"Completed"}</option>`;
}

updateUIText();

// 🔔 Notification
function showNotification(msg){
  const n=document.getElementById("notification");
  n.innerText=msg;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",3000);
}

// 🗺️ Map
let map=L.map('map').setView([30.0444,31.2357],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker=L.marker([30.0444,31.2357],{draggable:true}).addTo(map);
let currentLocation=null;

marker.on('dragend', e=>{
  const p=marker.getLatLng();
  currentLocation={lat:p.lat,lng:p.lng};
});

// ➕ ADD / UPDATE
window.addOrUpdate=async ()=>{
  if(!nameEl.value || !phoneEl.value){
    alert("أدخل البيانات");
    return;
  }

  const now=new Date();
  const reminderDate = reminderEl.value
    ? new Date(now.getTime()+reminderEl.value*86400000)
    : null;

  const data={
    name:nameEl.value,
    phone:phoneEl.value,
    date:dateEl.value,
    status:statusEl.value,
    notes:notesEl.value,
    agent:agentEl.value,
    location:currentLocation,
    reminderDate: reminderDate ? reminderDate.toISOString() : null
  };

  if(editId){
    await updateDoc(doc(db,"clients",editId),data);
    editId=null;
  }else{
    await addDoc(colRef,data);
  }

  clearForm();
  render();
}

// ✏️ EDIT
window.editClient=async(id)=>{
  const d=await getDoc(doc(db,"clients",id));
  if(d.exists()){
    const c=d.data();
    nameEl.value=c.name;
    phoneEl.value=c.phone;
    dateEl.value=c.date;
    statusEl.value=c.status;
    notesEl.value=c.notes;
    agentEl.value=c.agent;
    editId=id;
  }
}

// 🗑️
window.deleteClient=async(id)=>{
  await deleteDoc(doc(db,"clients",id));
  render();
}

// 📱 WhatsApp
window.openWhatsApp = function(phone){
  let msg = "مرحبا، بخصوص الطلب الخاص بك";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

// ⏰ Reminder
function checkReminder(c){
  if(!c.reminderDate) return "";
  if(new Date() >= new Date(c.reminderDate)){
    showNotification("⏰ Reminder: "+c.name);
    return "⚠️";
  }
  return "";
}

// 🎨 RENDER
async function render(){
  table.innerHTML="";
  let holdCount=0;

  const snap=await getDocs(colRef);

  snap.forEach(d=>{
    const c=d.data();

    if(c.status==="Hold"){
      holdCount++;
      showNotification("⚠️ Hold: "+c.name);
    }

    let rowClass=c.status==="Hold"?"holdRow":"";
    let reminder=checkReminder(c);

    table.innerHTML+=`
    <tr class="${rowClass}">
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.date}</td>
      <td>${c.status}</td>
      <td>${c.notes}</td>
      <td>${reminder}</td>
      <td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
      <td>${c.location?`🌍`:"-"}</td>
      <td><button onclick="editClient('${d.id}')">✏️</button></td>
      <td><button onclick="deleteClient('${d.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("total").innerText="Total: "+snap.size;
  document.getElementById("hold").innerText="Hold: "+holdCount;
}

// 🧹
function clearForm(){
  nameEl.value="";
  phoneEl.value="";
  dateEl.value="";
  notesEl.value="";
  agentEl.value="";
  reminderEl.value="";
}

render();
</script>

</body>
</html>
