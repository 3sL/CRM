<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System - Professional UI with Alerts</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; background:#e2e8f0; margin:0; padding:0;}
.container { max-width:1400px; margin:auto; background:#fff; padding:25px; border-radius:15px; box-shadow:0 0 25px rgba(0,0,0,0.2);}
.header { text-align:center; margin-bottom:25px; }
.header img { height:120px; width:auto; margin-bottom:10px; }
.developer, .phone { text-align:center; font-size:14px; margin:2px 0; color:#555; font-weight:600;}
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:25px; justify-content:center; }
.tab-btn { padding:12px 25px; background:#6c757d; border:none; cursor:pointer; border-radius:8px; font-weight:bold; color:#fff; transition:0.3s; }
.tab-btn.active { background:#007bff; color:#fff; }
.tab-btn:hover { background:#0056b3; }
.tab-content { display:none; animation:fadeIn 0.5s;}
.tab-content.active { display:block; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
input, select, button { padding:10px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:5px; border:1px solid #ccc;}
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { border:1px solid #ddd; padding:10px; text-align:center;}
th { background:#007bff; color:#fff; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:15px; }
.card { flex:1; background:#f1f3f5; padding:12px; text-align:center; border-radius:8px; min-width:150px; font-weight:bold;}
#notification { position: fixed; top:20px; right:20px; background:#ffc107; padding:15px; border-radius:12px; display:none; z-index:999; font-weight:bold; color:#000; box-shadow:0 0 15px rgba(0,0,0,0.3);}
.holdRow { background:#fff3cd; }
.erp-form { background:#f8f9fa; padding:20px; border-radius:10px; margin-top:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
.erp-table { width:100%; border-collapse:collapse; margin-top:10px;}
.erp-table th, .erp-table td { border:1px solid #ccc; padding:8px; text-align:center;}
.erp-table th { background:#495057; color:#fff; }
.tab-header { font-weight:bold; font-size:20px; margin-bottom:15px; text-align:center; color:#343a40; }
.green { background-color:#d4edda !important; }
.yellow { background-color:#fff3cd !important; }
.red { background-color:#f8d7da !important; }
.audio-alert { display:none;}
button.small-btn { padding:5px 8px; margin:2px; border-radius:5px; cursor:pointer; }
button.small-btn:hover { opacity:0.8;}
</style>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="notification"></div>
<audio id="audioAlert" class="audio-alert" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<div class="container">

<!-- Header -->
<div class="header">
<img src="logo.png" alt="Company Logo">
</div>
<div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>

<!-- Tabs -->
<div class="tabs">
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
<button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
<button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
</div>

<!-- CRM Tab -->
<div id="crmTab" class="tab-content active">
<h2 class="tab-header">CRM System</h2>
<div class="row">
<input id="name" placeholder="اسم العميل / Client Name">
<input id="phone" placeholder="رقم الهاتف / Phone">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات / Notes">
<input id="agent" placeholder="اسم المندوب / Agent">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام / Days">
</div>
<button onclick="addOrUpdate()">💾 حفظ / Save</button>
<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- Tasks Tab -->
<div id="tasksTab" class="tab-content">
<h2 class="tab-header">Tasks</h2>
<div class="row">
<input id="taskClient" placeholder="اسم العميل / Client Name">
<input id="taskType" placeholder="نوع المهمة / Task Type">
<input id="taskText" placeholder="نص المهمة / Task Text">
<input type="datetime-local" id="taskDateTime" placeholder="موعد المهمة / Date & Time">
<button onclick="addTask()">➕ إضافة / Add</button>
</div>
<ul id="taskList"></ul>
</div>

<!-- ERP Tab -->
<div id="erpTab" class="tab-content">
<h2 class="tab-header">ERP System</h2>
<div class="erp-form">
<input type="file" id="erpExcelFile" accept=".xlsx, .xls" onchange="handleERPFile(event)">
<button onclick="exportERPExcel()">📤 تصدير / Export</button>
<table id="erpTable" class="erp-table"></table>
</div>
</div>

<!-- Excel Tab -->
<div id="excelTab" class="tab-content">
<h2 class="tab-header">Excel Editor</h2>
<input type="file" id="excelFile" accept=".xlsx, .xls" onchange="handleExcelFile(event)">
<button onclick="exportExcelFile()">📤 تصدير / Export</button>
<table id="excelTable" class="erp-table"></table>
</div>

</div>

<script>
// ---------------- Tabs ----------------
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// ---------------- Notification ----------------
function showNotification(msg){
const n=document.getElementById("notification");
n.innerText=msg;
n.style.display="block";
document.getElementById("audioAlert").play();
setTimeout(()=>n.style.display="none",3000);
}

// ---------------- CRM ----------------
let clients = JSON.parse(localStorage.getItem("clients")||"[]");
let editIndex = -1;

function addOrUpdate(){
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const reminderEl=document.getElementById("reminderDays");
if(!nameEl.value.trim() || !phoneEl.value.trim()){ alert("⚠️ أدخل البيانات / Enter Data"); return; }
const clientData = {
name:nameEl.value.trim(),
phone:phoneEl.value.trim(),
date:dateEl.value,
status:statusEl.value,
notes:notesEl.value
};
if(editIndex===-1){ clients.push(clientData); } else { clients[editIndex]=clientData; editIndex=-1; }
localStorage.setItem("clients", JSON.stringify(clients));
nameEl.value=""; phoneEl.value=""; dateEl.value=""; notesEl.value=""; reminderEl.value="";
renderCRM();
}

function editClient(i){
const c=clients[i];
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
document.getElementById("date").value=c.date;
document.getElementById("status").value=c.status;
document.getElementById("notes").value=c.notes;
editIndex=i;
showNotification("✏️ تعديل العميل / Edit Client");
}

function deleteClient(i){
clients.splice(i,1);
localStorage.setItem("clients", JSON.stringify(clients));
renderCRM();
}

function openWhatsApp(phone){
window.open(`https://wa.me/${phone}`,'_blank');
}

function renderCRM(){
const table=document.getElementById("table");
table.innerHTML=""; let holdCount=0;
clients.forEach((c,i)=>{
let rowClass=c.status==="Hold"?"holdRow":"";
if(c.status==="Hold") holdCount++;
table.innerHTML+=`<tr class="${rowClass}">
<td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td>
<td>${c.notes}</td><td>-</td>
<td><button class="small-btn" onclick="openWhatsApp('${c.phone}')">📱</button></td>
<td><button class="small-btn" onclick="editClient(${i})">✏️</button></td>
<td><button class="small-btn" onclick="deleteClient(${i})">❌</button></td>
</tr>`;
});
document.getElementById("total").innerText="Total: "+clients.length;
document.getElementById("hold").innerText="Hold: "+holdCount;
}
renderCRM();

// ---------------- Tasks ----------------
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");
let editTaskIndex=-1;

function addTask(){
const client=document.getElementById("taskClient").value.trim();
const type=document.getElementById("taskType").value.trim();
const text=document.getElementById("taskText").value.trim();
const dateTime=document.getElementById("taskDateTime").value;
if(!client || !text) { alert("⚠️ أدخل البيانات / Enter Data"); return; }
const taskObj={client,type,text,dateTime};
if(editTaskIndex===-1) tasks.push(taskObj); else { tasks[editTaskIndex]=taskObj; editTaskIndex=-1; }
localStorage.setItem("tasks", JSON.stringify(tasks));
document.getElementById("taskClient").value="";
document.getElementById("taskType").value="";
document.getElementById("taskText").value="";
document.getElementById("taskDateTime").value="";
renderTasks();
}

function editTask(i){
document.getElementById("taskClient").value=tasks[i].client;
document.getElementById("taskType").value=tasks[i].type;
document.getElementById("taskText").value=tasks[i].text;
document.getElementById("taskDateTime").value=tasks[i].dateTime;
editTaskIndex=i;
showNotification("✏️ تعديل المهمة / Edit Task");
}

function deleteTask(i){ tasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); }

function renderTasks(){
const list=document.getElementById("taskList"); list.innerHTML="";
tasks.forEach((t,i)=>{
let color="";
if(t.type.toLowerCase().includes("تقديم عرض")) color="yellow";
else if(t.type.toLowerCase().includes("متابعة")) color="red";
else if(t.type.toLowerCase().includes("امر توريد")) color="green";
const li=document.createElement("li");
li.style.background=color; li.style.padding="5px"; li.style.margin="3px 0";
li.innerHTML=`${t.client} | ${t.type} | ${t.text} | ${t.dateTime}
<button class="small-btn" onclick="editTask(${i})">✏️</button>
<button class="small-btn" onclick="deleteTask(${i})">❌</button>`;
list.appendChild(li);
});
}

// --------------- Task Alerts ----------------
function checkTaskAlerts(){
const now=new Date();
tasks.forEach(t=>{
if(t.dateTime){
const taskTime=new Date(t.dateTime);
if(Math.abs(taskTime-now)<60000){ // within 1 min
showNotification(`⏰ مهمة: ${t.type} للعميل: ${t.client}`);
}
}
});
}
setInterval(checkTaskAlerts,60000);
renderTasks();

// ---------------- ERP & Excel ----------------
function handleERPFile(e){ handleExcelGeneric(e,"erpTable","erpData"); }
function handleExcelFile(e){ handleExcelGeneric(e,"excelTable","excelData"); }

function handleExcelGeneric(e,tableId,storageKey){
const file=e.target.files[0]; if(!file) return;
const reader=new FileReader();
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet,{header:1});
localStorage.setItem(storageKey,JSON.stringify(json));
renderExcelTable(json,tableId);
};
reader.readAsArrayBuffer(file);
}

function renderExcelTable(data,tableId){
const table=document.getElementById(tableId);
table.innerHTML="";
data.forEach((row,rIdx)=>{
const tr=document.createElement("tr");
row.forEach((cell,cIdx)=>{
const td=document.createElement("td");
if(rIdx===0){ td.innerText=cell; td.style.fontWeight="bold"; td.style.background="#007bff"; td.style.color="#fff";}
else{ const inp=document.createElement("input"); inp.value=cell; inp.style.width="100%"; td.appendChild(inp); }
tr.appendChild(td);
});
table.appendChild(tr);
});
}

function exportERPExcel(){ exportExcelGeneric("erpTable"); }
function exportExcelFile(){ exportExcelGeneric("excelTable"); }

function exportExcelGeneric(tableId){
const table=document.getElementById(tableId);
const wb=XLSX.utils.book_new();
const ws=XLSX.utils.table_to_sheet(table);
XLSX.utils.book_append_sheet(wb,ws,"Sheet1");
XLSX.writeFile(wb,"export.xlsx");
}

// Load saved Excel data
if(localStorage.getItem("erpData")) renderExcelTable(JSON.parse(localStorage.getItem("erpData")),"erpTable");
if(localStorage.getItem("excelData")) renderExcelTable(JSON.parse(localStorage.getItem("excelData")),"excelTable");

</script>
</body>
</html>
