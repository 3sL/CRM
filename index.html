<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System Management</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
button { cursor:pointer; }
.lang-btn { width:auto; margin-bottom:15px;}
.stats { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:150px;}
.header { text-align:center; margin-bottom:10px;}
.logo { height:200px; width:auto; display: block; margin: 0 auto 20px auto;}
.developer { text-align:right; margin-bottom:5px; font-size:14px; }
.phone { text-align:right; margin-bottom:15px; font-size:14px; }
#map { width:100%; height:350px; margin-top:15px; border-radius:10px;}
</style>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">

<div class="header">
  <img src="logo.png" alt="Company Logo" class="logo">
</div>
<div class="developer" id="developer"></div>
<div class="phone" id="phoneText"></div>

<button class="lang-btn" onclick="toggleLang()">🌐 عربي / English</button>

<h2 id="title"></h2>

<div class="row">
<input id="agentFilter" oninput="render()">
<select id="regionFilter"></select>
</div>

<div class="row">
<input id="name">
<input id="phone">
<input type="date" id="date">
<select id="status"></select>
<input id="notes">
<input id="agent">
<select id="region"></select>
</div>

<div class="row">
<button onclick="startTracking()" id="trackBtn"></button>
<button onclick="stopTracking()" id="stopTrackBtn"></button>
<button onclick="addOrUpdate()" id="saveBtn"></button>
<button onclick="exportExcel()" id="exportBtn"></button>
</div>

<div class="stats">
<div class="card" id="total"></div>
<div class="card" id="interested"></div>
<div class="card" id="working"></div>
<div class="card" id="done"></div>
</div>

<div id="map"></div>

<table>
<thead>
<tr>
<th id="thName"></th>
<th id="thPhone"></th>
<th id="thDate"></th>
<th id="thStatus"></th>
<th id="thNotes"></th>
<th id="thAgent"></th>
<th id="thCreatedBy"></th>
<th id="thCreatedAt"></th>
<th id="thRegion"></th>
<th id="thLocation"></th>
<th id="thDistance"></th>
<th id="thEdit"></th>
<th id="thDelete"></th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase
const firebaseConfig = { apiKey:"...", authDomain:"...", projectId:"..." };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db,"clients");

// Regions
const egyptRegions=["القاهرة","الإسكندرية","الجيزة","القليوبية","الشرقية","الدقهلية",
"المنوفية","الغربية","كفر الشيخ","دمياط","بورسعيد","السويس",
"الإسماعيلية","الفيوم","بني سويف","المنيا","أسيوط","سوهاج",
"قنا","الأقصر","أسوان","مطروح","الوادي الجديد","شمال سيناء",
"جنوب سيناء","البحر الأحمر"];

// Language setup
let lang="ar";
const langTexts = {
  ar:{
    title:"نظام إدارة CRM لشركة يوتوبيا للتجارة والتصدير",
    developer:'تم إنشاؤه وتصميمه وتطويره بواسطة Eng : <strong>Mahmoud Mohamed Marie</strong>',
    phone:"📞 01222153415",
    placeholders: {name:"اسم العميل", phone:"رقم الهاتف", notes:"ملاحظات", agent:"أدخل اسم العميل", filter:"فلترة حسب العميل (اختياري)"},
    buttons: {track:"📍 بدء التتبع", stop:"⛔ إيقاف", save:"💾 حفظ", export:"📊 Excel"},
    stats: {total:"إجمالي", interested:"مهتم", working:"قيد التنفيذ", done:"مكتمل"},
    tableHeaders: {name:"الاسم", phone:"الهاتف", date:"التاريخ", status:"الحالة", notes:"ملاحظات", agent:"العميل", createdBy:"الأدمن", createdAt:"تاريخ الإنشاء", region:"المحافظة", location:"الموقع", distance:"المسافة", edit:"تعديل", delete:"حذف"},
    selectRegion:"اختر المحافظة",
    allRegions:"كل المحافظات",
    statusOptions:["مهتم","قيد التنفيذ","مكتمل"]
  },
  en:{
    title:"CRM System Management For Utopia Trading And Export",
    developer:'Created & Developed by Eng : <strong>Mahmoud Mohamed Marie</strong>',
    phone:"📞 01222153415",
    placeholders: {name:"Customer Name", phone:"Phone Number", notes:"Notes", agent:"Agent Name", filter:"Filter by Agent (optional)"},
    buttons: {track:"📍 Start Tracking", stop:"⛔ Stop", save:"💾 Save", export:"📊 Excel"},
    stats: {total:"Total", interested:"Interested", working:"In Progress", done:"Completed"},
    tableHeaders: {name:"Name", phone:"Phone", date:"Date", status:"Status", notes:"Notes", agent:"Agent", createdBy:"Created By", createdAt:"Created At", region:"Region", location:"Location", distance:"Distance", edit:"Edit", delete:"Delete"},
    selectRegion:"Select Region",
    allRegions:"All Regions",
    statusOptions:["Interested","In Progress","Completed"]
  }
};

// GLOBAL ELEMENTS
const name=document.getElementById("name"), phone=document.getElementById("phone"), date=document.getElementById("date"),
status=document.getElementById("status"), notes=document.getElementById("notes"), agent=document.getElementById("agent"),
region=document.getElementById("region"), agentFilter=document.getElementById("agentFilter"), regionFilter=document.getElementById("regionFilter"),
table=document.getElementById("table"), totalEl=document.getElementById("total"), interestedEl=document.getElementById("interested"),
workingEl=document.getElementById("working"), doneEl=document.getElementById("done"),
trackBtn=document.getElementById("trackBtn"), stopTrackBtn=document.getElementById("stopTrackBtn"),
saveBtn=document.getElementById("saveBtn"), exportBtn=document.getElementById("exportBtn");

// MARKER AND MAP
let map = L.map('map').setView([30.0444,31.2357],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
let marker = L.marker([30.0444,31.2357],{draggable:true}).addTo(map);
let currentLocation=null;
marker.on('dragend',()=>{ const pos=marker.getLatLng(); currentLocation={lat:pos.lat,lng:pos.lng}; region.value=getRegionFromLatLng(pos.lat,pos.lng);});
map.on('click', e=>{ marker.setLatLng(e.latlng); currentLocation={lat:e.latlng.lat,lng:e.latlng.lng}; region.value=getRegionFromLatLng(e.latlng.lat,e.latlng.lng);});
function getRegionFromLatLng(lat){ if(lat>31) return "الإسكندرية"; if(lat>30.5) return "القليوبية"; if(lat>30) return "القاهرة"; if(lat>29) return "السويس"; return "القاهرة"; }

// TRACKING
let watchId;
function startTracking(){ watchId=navigator.geolocation.watchPosition(p=>{ const lat=p.coords.latitude,lng=p.coords.longitude; currentLocation={lat,lng}; marker.setLatLng([lat,lng]); map.setView([lat,lng],13); }); }
function stopTracking(){ navigator.geolocation.clearWatch(watchId); }

// DISTANCE
function calcDistance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(2);
}

// FILL REGION SELECTS
function fillRegionSelects(){
  region.innerHTML=""; regionFilter.innerHTML="";
  let defaultOpt=document.createElement("option"); defaultOpt.value=""; defaultOpt.text=langTexts[lang].selectRegion; region.appendChild(defaultOpt);
  let defaultOptFilter=document.createElement("option"); defaultOptFilter.value=""; defaultOptFilter.text=langTexts[lang].allRegions; regionFilter.appendChild(defaultOptFilter);
  egyptRegions.forEach(r=>{
    let o1=document.createElement("option"); o1.value=r; o1.text=r; region.appendChild(o1);
    let o2=document.createElement("option"); o2.value=r; o2.text=r; regionFilter.appendChild(o2);
  });
}

// ADD/UPDATE CLIENT
let editId=null;
async function addOrUpdate(){
  if(!name.value || !phone.value){ alert(lang==="ar"?"أدخل الاسم ورقم الهاتف":"Enter Name & Phone"); return;}
  const now=new Date().toLocaleString();
  const clientData={ name:name.value, phone:phone.value, date:date.value, status:status.value, notes:notes.value, location:currentLocation, agent:agent.value||"-", region:region.value||"-", createdBy:agent.value||"-", createdAt:now };
  try{ if(editId){ await updateDoc(doc(db,"clients",editId),clientData); editId=null; } else{ await addDoc(colRef,clientData);} clearForm(); render(); }catch(e){ console.error(e); alert("❌ Error");}
}

// EDIT
async function editClient(id){
  const d = await getDoc(doc(db,"clients",id));
  if(d.exists()){
    const c=d.data();
    name.value=c.name; phone.value=c.phone; date.value=c.date;
    notes.value=c.notes; agent.value=c.agent; region.value=c.region;
    if(c.location){ currentLocation=c.location; marker.setLatLng([c.location.lat,c.location.lng]); map.setView([c.location.lat,c.location.lng],13);}
    editId=id;

    // تحديث Status حسب اللغة الحالية مع الحفاظ على القيمة القديمة
    updateStatusOptions(c.status);
  }
}

// UPDATE STATUS OPTIONS
function updateStatusOptions(selectedStatus){
  status.innerHTML="";
  langTexts[lang].statusOptions.forEach(opt=>{
    const o=document.createElement("option");
    o.value=o.text=opt;
    if(opt===selectedStatus) o.selected=true;
    status.appendChild(o);
  });
}

// CLEAR
function clearForm(){ name.value=""; phone.value=""; date.value=""; notes.value=""; agent.value=""; region.value=""; editId=null; currentLocation=null; updateStatusOptions(langTexts[lang].statusOptions[0]); }

// RENDER
async function render(){
  table.innerHTML="";
  const filterAgent=agentFilter.value.toLowerCase();
  const filterRegion=regionFilter.value;
  let total=0, interested=0, working=0, done=0;
  const snap=await getDocs(colRef);
  snap.forEach(d=>{
    const c=d.data();
    if(filterAgent && !c.agent.toLowerCase().includes(filterAgent)) return;
    if(filterRegion && c.region!==filterRegion) return;
    total++;
    if(c.status===langTexts["en"].statusOptions[0] || c.status===langTexts["ar"].statusOptions[0]) interested++;
    else if(c.status===langTexts["en"].statusOptions[1] || c.status===langTexts["ar"].statusOptions[1]) working++;
    else if(c.status===langTexts["en"].statusOptions[2] || c.status===langTexts["ar"].statusOptions[2]) done++;
    let dist=c.location && currentLocation ? calcDistance(currentLocation.lat,currentLocation.lng,c.location.lat,c.location.lng)+" km" : "-";
    table.innerHTML+=`
    <tr>
      <td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td><td>${c.notes}</td>
      <td>${c.agent}</td><td>${c.createdBy}</td><td>${c.createdAt}</td>
      <td>${c.region}</td>
      <td>${c.location ? `<a href="https://www.openstreetmap.org/?mlat=${c.location.lat}&mlon=${c.location.lng}" target="_blank">🌍 Open</a>`:"-"}</td>
      <td>${dist}</td>
      <td><button onclick="editClient('${d.id}')">✏️</button></td>
      <td><button onclick="deleteClient('${d.id}')">❌</button></td>
    </tr>`;
  });
  totalEl.innerText=`👥 ${langTexts[lang].stats.total}: ${total}`;
  interestedEl.innerText=`🎯 ${langTexts[lang].stats.interested}: ${interested}`;
  workingEl.innerText=`🔧 ${langTexts[lang].stats.working}: ${working}`;
  doneEl.innerText=`✅ ${langTexts[lang].stats.done}: ${done}`;
}

// DELETE
async function deleteClient(id){ await deleteDoc(doc(db,"clients",id)); render(); }

// EXPORT Excel
async function exportExcel(){
  const snap = await getDocs(colRef);
  const data = [];
  const headers = lang === "ar"
    ? ["الاسم","الهاتف","التاريخ","الحالة","ملاحظات","العميل","المحافظة","الادمن","تاريخ الإنشاء","Lat","Lng"]
    : ["Name","Phone","Date","Status","Notes","Agent","Region","CreatedBy","CreatedAt","Lat","Lng"];
  data.push(headers);
  snap.forEach(d => {
    const c = d.data();
    data.push([ c.name||"", c.phone||"", c.date||"", c.status||"", c.notes||"", c.agent||"", c.region||"", c.createdBy||"", c.createdAt||"", c.location?.lat||"", c.location?.lng||"" ]);
  });
  const worksheet = XLSX.utils.aoa_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Clients");
  XLSX.writeFile(workbook, "clients.xlsx");
}

// TOGGLE LANGUAGE
function toggleLang(){
  lang = lang==="ar"?"en":"ar";
  document.body.dir = lang==="ar"?"rtl":"ltr";
  document.getElementById("title").innerText = langTexts[lang].title;
  document.getElementById("developer").innerHTML = langTexts[lang].developer;
  document.getElementById("phoneText").innerText = langTexts[lang].phone;

  // placeholders
  name.placeholder = langTexts[lang].placeholders.name;
  phone.placeholder = langTexts[lang].placeholders.phone;
  notes.placeholder = langTexts[lang].placeholders.notes;
  agent.placeholder = langTexts[lang].placeholders.agent;
  agentFilter.placeholder = langTexts[lang].placeholders.filter;

  // buttons
  trackBtn.innerText = langTexts[lang].buttons.track;
  stopTrackBtn.innerText = langTexts[lang].buttons.stop;
  saveBtn.innerText = langTexts[lang].buttons.save;
  exportBtn.innerText = langTexts[lang].buttons.export;

  // table headers
  Object.keys(langTexts[lang].tableHeaders).forEach(id=>{
    document.getElementById("th"+id.charAt(0).toUpperCase()+id.slice(1)).innerText = langTexts[lang].tableHeaders[id];
  });

  // update status dropdown while keeping current selection
  const currentStatus = status.value || langTexts[lang].statusOptions[0];
  updateStatusOptions(currentStatus);

  // fill regions
  fillRegionSelects();
  // rerender stats
  render();
}

// INIT
fillRegionSelects();
toggleLang(); // sets initial language and direction
window.startTracking=startTracking; window.stopTracking=stopTracking; window.addOrUpdate=addOrUpdate;
window.deleteClient=deleteClient; window.editClient=editClient; window.exportExcel=exportExcel;
</script>
</body>
</html>
