<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System</title>

<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0;}
.container { max-width:1400px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
.header { text-align:center; margin-bottom:20px; }
.header img { height:120px; width:auto; margin-bottom:10px; }
.developer, .phone { text-align:center; font-size:14px; margin:2px 0; color:#555; }
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.tab-btn { padding:10px 20px; background:#ddd; border:none; cursor:pointer; border-radius:5px;}
.tab-btn.active { background:#007bff; color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
input, select, button { padding:10px; margin:5px 0; width:100%; box-sizing:border-box; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#222; color:#fff; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:150px;}
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; padding:15px; border-radius:10px; display:none; z-index:999; }
.holdRow { background:#fff3cd; }
.erp-form { background:#f9f9f9; padding:15px; border-radius:8px; margin-top:10px; }
.erp-form table th, .erp-form table td { padding:8px; text-align:center; }
.erp-btn-add { background:#28a745; color:#fff; border:none; padding:8px 12px; cursor:pointer; border-radius:5px; margin-top:5px;}
.erp-btn-submit { background:#007bff; color:#fff; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; margin-top:10px; width:100%; }
.row-error { background:#f8d7da !important; }
.task-row input { width:100%; box-sizing:border-box; padding:5px; }
.language-btn { position: fixed; top:20px; left:20px; background:#007bff; color:#fff; border:none; padding:8px 12px; cursor:pointer; border-radius:5px; z-index:999; }
</style>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>
<body>

<button class="language-btn" onclick="toggleLanguage()">EN / AR</button>
<div id="notification"></div>

<div class="container">

<div class="header">
<img src="logo.png" alt="Company Logo">
</div>
<div class="developer" id="developerText">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
<button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
<button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
</div>

<!-- CRM Tab -->
<div id="crmTab" class="tab-content active">
<h2 id="crmTitle">CRM System</h2>
<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات">
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>
<button onclick="addOrUpdate()" id="saveBtn">💾 حفظ</button>

<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>

<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- Tasks Tab -->
<div id="tasksTab" class="tab-content">
<h2 id="tasksTitle">Tasks</h2>
<div class="row">
<input id="taskInput" placeholder="اكتب المهمة">
<input type="date" id="taskDate" placeholder="تاريخ المهمة">
<select id="offerStatus">
<option>تقديم عرض سعر</option>
<option>متابعة عرض السعر</option>
<option>أمر توريد</option>
</select>
<button onclick="addTask()">➕ إضافة المهمة</button>
</div>
<div class="row">
<input type="file" id="taskExcelFile" onchange="importTasksFromExcel(event)">
</div>
<table id="taskTable">
<thead>
<tr>
<th>المهمة</th>
<th>التاريخ</th>
<th>نوع المهمة</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- ERP Tab -->
<div id="erpTab" class="tab-content">
<h2 id="erpTitle">ERP - قيود محاسبية</h2>
<div class="erp-form">
<table id="accountingTable">
<thead>
<tr>
<th>الحساب</th>
<th>مدين</th>
<th>دائن</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr>
<td>الإجمالي</td>
<td id="totalDebit">0.00</td>
<td id="totalCredit">0.00</td>
</tr>
</tfoot>
</table>
<button class="erp-btn-add" onclick="addAccountingRow()">+ إضافة سطر</button>
<button class="erp-btn-submit" onclick="submitAccountingForm()">💾 حفظ القيد</button>
</div>
</div>

<!-- Excel Tab -->
<div id="excelTab" class="tab-content">
<h2 id="excelTitle">Excel Import/Export</h2>
<input type="file" onchange="handleFile(event)">
<button onclick="exportExcelFile()">📊 تصدير Excel</button>
<table id="excelTable"></table>
</div>

</div>

<script>
// ===================== Language Toggle =====================
let currentLang = 'ar';
function toggleLanguage(){
currentLang = currentLang==='ar'?'en':'ar';
if(currentLang==='ar'){
document.documentElement.dir='rtl';
document.getElementById("crmTitle").innerText='CRM System';
document.getElementById("tasksTitle").innerText='Tasks';
document.getElementById("erpTitle").innerText='ERP - قيود محاسبية';
document.getElementById("excelTitle").innerText='Excel Import/Export';
document.getElementById("developerText").innerHTML='Developed by Eng : <strong>Mahmoud Mohamed Marie</strong>';
document.getElementById("saveBtn").innerText='💾 حفظ';
}else{
document.documentElement.dir='ltr';
document.getElementById("crmTitle").innerText='نظام إدارة العملاء';
document.getElementById("tasksTitle").innerText='المهام';
document.getElementById("erpTitle").innerText='المحاسبة - ERP';
document.getElementById("excelTitle").innerText='استيراد / تصدير Excel';
document.getElementById("developerText").innerHTML='تم التطوير بواسطة م. محمود محمد';
document.getElementById("saveBtn").innerText='💾 Save';
}
}

// ===================== Tabs =====================
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// ===================== Notification =====================
function showNotification(msg){
const n=document.getElementById("notification");
n.innerText=msg;
n.style.display="block";
setTimeout(()=>n.style.display="none",3000);
}

// ===================== CRM =====================
let clients=JSON.parse(localStorage.getItem("clients")||"[]");
let editIndex=-1;
function addOrUpdate(){
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const reminderEl=document.getElementById("reminderDays");
if(!nameEl.value.trim()||!phoneEl.value.trim()){
alert(currentLang==='ar'?"⚠️ أدخل الاسم ورقم الهاتف":"⚠️ Enter name and phone"); return;
}
const clientData={name:nameEl.value.trim(),phone:phoneEl.value.trim(),date:dateEl.value,status:statusEl.value,notes:notesEl.value};
if(editIndex===-1){ clients.push(clientData); }else{ clients[editIndex]=clientData; editIndex=-1; }
localStorage.setItem("clients",JSON.stringify(clients));
nameEl.value=""; phoneEl.value=""; dateEl.value=""; notesEl.value=""; reminderEl.value="";
showNotification(currentLang==='ar'?"✅ تم الحفظ بنجاح":"✅ Saved successfully");
render();
}
function editClient(i){ const c=clients[i]; document.getElementById("name").value=c.name; document.getElementById("phone").value=c.phone; document.getElementById("date").value=c.date; document.getElementById("status").value=c.status; document.getElementById("notes").value=c.notes; editIndex=i; showNotification(currentLang==='ar'?"✏️ تعديل العميل":"✏️ Edit client"); }
function deleteClient(i){ clients.splice(i,1); localStorage.setItem("clients",JSON.stringify(clients)); render(); }
function openWhatsApp(phone){ window.open(`https://wa.me/${phone}`,'_blank'); }
function render(){ const table=document.getElementById("table"); table.innerHTML=""; let holdCount=0; clients.forEach((c,i)=>{ let rowClass=c.status==="Hold"?"holdRow":""; if(c.status==="Hold") holdCount++; table.innerHTML+=`<tr class="${rowClass}"><td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td><td>${c.notes}</td><td>-</td><td><button onclick="openWhatsApp('${c.phone}')">📱</button></td><td><button onclick="editClient(${i})">✏️</button></td><td><button onclick="deleteClient(${i})">❌</button></td></tr>`; }); document.getElementById("total").innerText="Total: "+clients.length; document.getElementById("hold").innerText="Hold: "+holdCount; }
render();

// ===================== Tasks =====================
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");
function addTask(){
const taskInput=document.getElementById("taskInput");
const taskDate=document.getElementById("taskDate");
const offerStatus=document.getElementById("offerStatus");
if(!taskInput.value.trim()) return;
tasks.push({task:taskInput.value.trim(),date:taskDate.value,type:offerStatus.value});
localStorage.setItem("tasks",JSON.stringify(tasks));
taskInput.value=""; taskDate.value=""; renderTasks();
}
function deleteTask(i){ tasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); }
function editTask(i){ const t=tasks[i]; document.getElementById("taskInput").value=t.task; document.getElementById("taskDate").value=t.date; document.getElementById("offerStatus").value=t.type; tasks.splice(i,1); renderTasks(); }
function renderTasks(){ const tbody=document.getElementById("taskTable").querySelector("tbody"); tbody.innerHTML=""; tasks.forEach((t,i)=>{ const tr=document.createElement("tr"); tr.className="task-row"; tr.innerHTML=`<td>${t.task}</td><td>${t.date}</td><td>${t.type}</td><td><button onclick="editTask(${i})">✏️</button></td><td><button onclick="deleteTask(${i})">❌</button></td>`; tbody.appendChild(tr); }); }
renderTasks();

// ===================== Import Tasks from Excel =====================
function importTasksFromExcel(e){
const file=e.target.files[0]; if(!file) return;
const reader=new FileReader();
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet,{header:1});
json.forEach((row,i)=>{ if(i===0) return; if(row.length>=3){ tasks.push({task:row[0],date:row[1],type:row[2]}); } });
localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); showNotification(currentLang==='ar'?"✅ تم استيراد المهام من Excel":"✅ Tasks imported from Excel");
};
reader.readAsArrayBuffer(file);
}

// ===================== ERP =====================
function addAccountingRow(){ const tbody=document.getElementById("accountingTable").querySelector("tbody"); const newRow=document.createElement("tr"); newRow.innerHTML=`<td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option><option>المديونية</option><option>العهدة</option></select></td><td><input type="number" class="debit" value="0.00"></td><td><input type="number" class="credit" value="0.00"></td>`; tbody.appendChild(newRow); updateERPsum(); newRow.querySelectorAll('input').forEach(inp=>inp.addEventListener('input', updateERPsum)); }
function updateERPsum(){ let totalD=0,totalC=0; document.querySelectorAll('#accountingTable tbody tr').forEach(r=>{ const d=parseFloat(r.querySelector('.debit').value)||0; const c=parseFloat(r.querySelector('.credit').value)||0; if(d!==c&&(d!==0||c!==0)){ r.classList.add('row-error'); } else { r.classList.remove('row-error'); } totalD+=d; totalC+=c; }); document.getElementById("totalDebit").innerText=totalD.toFixed(2); document.getElementById("totalCredit").innerText=totalC.toFixed(2); }
function submitAccountingForm(){ updateERPsum(); let totalD=parseFloat(document.getElementById("totalDebit").innerText); let totalC=parseFloat(document.getElementById("totalCredit").innerText); if(totalD!==totalC){ alert(currentLang==='ar'?"⚠️ المدين والدائن غير متساويين!":"⚠️ Debit and Credit not equal!"); return; } showNotification(currentLang==='ar'?"✅ تم حفظ القيد بنجاح":"✅ Entry saved successfully"); localStorage.setItem("erpData",document.getElementById("accountingTable").innerHTML); }
if(localStorage.getItem("erpData")) document.getElementById("accountingTable").innerHTML=localStorage.getItem("erpData"); updateERPsum();

// ===================== Excel Import/Export =====================
function handleFile(e){ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(evt){ const data=new Uint8Array(evt.target.result); const workbook=XLSX.read(data,{type:"array"}); const sheet=workbook.Sheets[workbook.SheetNames[0]]; const json=XLSX.utils.sheet_to_json(sheet,{header:1}); renderExcel(json); }; reader.readAsArrayBuffer(file); }
function renderExcel(data){ const table=document.getElementById("excelTable"); table.innerHTML=""; data.forEach((row,rIdx)=>{ const tr=document.createElement("tr"); row.forEach((cell,cIdx)=>{ const td=document.createElement("td"); if(rIdx===0){ td.innerText=cell; }else{ const inp=document.createElement("input"); inp.value=cell; td.appendChild(inp); } tr.appendChild(td); }); table.appendChild(tr); }); showNotification(currentLang==='ar'?"✅ تم استيراد البيانات من Excel":"✅ Data imported from Excel"); }
function exportExcelFile(){ const table=document.getElementById("excelTable"); const wb=XLSX.utils.book_new(); const ws=XLSX.utils.table_to_sheet(table); XLSX.utils.book_append_sheet(wb,ws,"Sheet1"); XLSX.writeFile(wb,"export.xlsx"); }
</script>

</body>
</html>
