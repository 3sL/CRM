<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0; display:flex; flex-direction:row; min-height:100vh; }
.sidebar { width:250px; background:#007bff; color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box;}
.sidebar h2 { text-align:center; margin-bottom:20px; }
.sidebar button { background:#0056b3; color:#fff; border:none; padding:10px; margin:5px 0; border-radius:5px; cursor:pointer; text-align:right; }
.sidebar button.active { background:#ffcc00; color:#000; }
.tabs-content { flex:1; padding:20px; overflow:auto; width:100%; box-sizing:border-box; }
.tab-content { display:none; }
.tab-content.active { display:block; }
h2 { margin-top:0; text-align:center;}
input, select, textarea, button { padding:10px; margin:5px 0; width:100%; box-sizing:border-box;}
textarea { resize:none; height:80px;}
table { width:100%; border-collapse:collapse; margin-top:10px; table-layout: fixed; }
th, td { border:1px solid #ddd; padding:10px; text-align:center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
th { background:#222; color:#fff;}
.card { background:#eee; padding:10px; text-align:center; border-radius:8px; margin:5px; flex:1;}
.row { display:flex; flex-wrap:wrap; gap:10px;}
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; padding:15px; border-radius:10px; display:none; z-index:999; min-width:200px;}
.task-stage { padding:5px; color:#fff; border-radius:5px; }
.stage-quote { background:orange; }
.stage-follow { background:blue; }
.stage-order { background:green; }
#excelTable { width: 100%; border: 1px solid #000; table-layout: fixed; }
#excelTable th, #excelTable td { border: 1px solid #000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logo-container { text-align:center; margin-bottom:15px; }
.logo-container img { max-width:150px; display:inline-block; }
@media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width:100%; flex-direction: row; overflow-x: auto; }
    .sidebar button { flex:1 0 auto; margin:0 5px; white-space: nowrap; }
    .tabs-content { padding:10px; }
    table, #excelTable { display:block; overflow-x:auto; }
    th, td { white-space: nowrap; }
}
</style>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="sidebar">
<h2>CRM & ERP</h2>
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
<button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
<button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
<hr>
<div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>
<select id="language" onchange="changeLang(this.value)">
<option value="ar">عربي</option>
<option value="en">English</option>
</select>
</div>

<div class="tabs-content">
<div id="notification"></div>

<!-- CRM Tab -->
<div id="crmTab" class="tab-content active">
<div class="logo-container"><img src="logo.png" alt="شعار الشركة"></div>
<h2>CRM System</h2>
<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<textarea id="notes" placeholder="ملاحظات"></textarea>
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>
<button onclick="addOrUpdate()">💾 حفظ</button>
<div class="row">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<div style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

<!-- Tasks Tab -->
<div id="tasksTab" class="tab-content">
<div class="logo-container"><img src="logo.png" alt="شعار الشركة"></div>
<h2>Tasks</h2>
<div class="row">
<input id="taskInput" placeholder="نص المهمة">
<input id="taskClient" placeholder="اسم العميل">
<input type="date" id="taskDate">
<select id="taskStage">
<option value="quote">تقديم عرض سعر</option>
<option value="follow">متابعة عرض السعر</option>
<option value="order">أمر توريد</option>
</select>
<button onclick="addTask()">➕ إضافة المهمة</button>
</div>
<ul id="taskList"></ul>
</div>

<!-- ERP Tab -->
<div id="erpTab" class="tab-content">
<div class="logo-container"><img src="logo.png" alt="شعار الشركة"></div>
<h2>ERP System</h2>
<div class="row">
<select id="erpAccount"><option value="">اختر العميل</option></select>
<select id="erpType">
<option value="عهدة">عهدة</option>
<option value="خزنة">خزنة</option>
<option value="بنوك">بنوك</option>
<option value="تأخيرات">تأخيرات</option>
<option value="غرامات">غرامات</option>
<option value="خصومات">خصومات</option>
<option value="أخرى">أخرى</option>
</select>
<input type="number" id="erpDebit" placeholder="مدين">
<input type="number" id="erpCredit" placeholder="دائن">
<button onclick="addERP()">💾 إضافة القيد</button>
</div>
<div style="overflow-x:auto;">
<table id="erpTable">
<thead>
<tr><th>الحساب</th><th>النوع</th><th>مدين</th><th>دائن</th></tr>
</thead>
<tbody></tbody>
<tfoot>
<tr><th>الإجمالي</th><th>-</th><th id="totalDebit">0</th><th id="totalCredit">0</th></tr>
</tfoot>
</table>
</div>
</div>

<!-- Excel Tab -->
<div id="excelTab" class="tab-content">
<div class="logo-container"><img src="logo.png" alt="شعار الشركة"></div>
<h2>Excel Upload & Edit</h2>
<input type="file" id="excelFile" onchange="handleFile(event)">
<button onclick="exportExcelFile()">📊 تصدير Excel</button>
<button onclick="saveExcelData()">💾 حفظ داخل البرنامج</button>
<div style="overflow-x:auto;">
<table id="excelTable"></table>
</div>
</div>

</div>

<script>
// --- Tabs ---
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
if(id==='excelTab'){ loadStoredExcel(); }
}

// --- Notification ---
function showNotification(msg){
const n=document.getElementById("notification");
n.innerText=msg;
n.style.display="block";
setTimeout(()=>n.style.display="none",3000);
}

// --- CRM ---
let clients=JSON.parse(localStorage.getItem("clients")||"[]");
let editIndex=-1;
function addOrUpdate(){
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
if(!nameEl.value.trim() || !phoneEl.value.trim()){alert("⚠️ أدخل البيانات"); return;}
const clientData={name:nameEl.value,phone:phoneEl.value,date:dateEl.value,status:statusEl.value,notes:notesEl.value};
if(editIndex===-1){
clients.push(clientData);
showNotification("✅ تم إضافة عميل جديد");
}else{
clients[editIndex]=clientData;
showNotification("✏️ تم تعديل العميل");
editIndex=-1;
}
localStorage.setItem("clients",JSON.stringify(clients));
updateERPAccounts();
nameEl.value=""; phoneEl.value=""; dateEl.value=""; notesEl.value="";
renderCRM();
}
function renderCRM(){
const table=document.getElementById("table"); table.innerHTML="";
let holdCount=0;
clients.forEach((c,i)=>{
if(c.status==="Hold") holdCount++;
table.innerHTML+=`<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td><td>${c.notes}</td><td>-</td>
<td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
<td><button onclick="editClient(${i})">✏️</button></td>
<td><button onclick="deleteClient(${i})">❌</button></td></tr>`;
});
document.getElementById("total").innerText="Total: "+clients.length;
document.getElementById("hold").innerText="Hold: "+holdCount;
}
function editClient(i){
const c=clients[i];
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
document.getElementById("date").value=c.date;
document.getElementById("status").value=c.status;
document.getElementById("notes").value=c.notes;
editIndex=i;
showNotification("✏️ تعديل العميل");
}
function deleteClient(i){
clients.splice(i,1);
localStorage.setItem("clients",JSON.stringify(clients));
renderCRM();
updateERPAccounts();
showNotification("❌ تم حذف العميل");
}
function openWhatsApp(phone){window.open(`https://wa.me/${phone}`,'_blank');}
renderCRM();

// --- تحديث ERP Accounts تلقائياً ---
function updateERPAccounts(){
const sel=document.getElementById("erpAccount");
sel.innerHTML='<option value="">اختر العميل</option>';
clients.forEach(c=>{
const opt=document.createElement("option");
opt.value=c.name;
opt.text=c.name;
sel.appendChild(opt);
});
}
updateERPAccounts();

// --- ERP ---
let erpData=JSON.parse(localStorage.getItem("erpData")||"[]");
function addERP(){
const acc=document.getElementById("erpAccount").value;
const type=document.getElementById("erpType").value;
const debit=parseFloat(document.getElementById("erpDebit").value)||0;
const credit=parseFloat(document.getElementById("erpCredit").value)||0;
if(!acc) return alert("أدخل الحساب");
erpData.push({acc,type,debit,credit});
localStorage.setItem("erpData",JSON.stringify(erpData));
document.getElementById("erpDebit").value="";
document.getElementById("erpCredit").value="";
renderERP();
showNotification("💾 تم إضافة القيد المحاسبي");
}
function renderERP(){
const tbody=document.querySelector("#erpTable tbody");
tbody.innerHTML="";
let totalD=0,totalC=0;
erpData.forEach(e=>{
tbody.innerHTML+=`<tr><td>${e.acc}</td><td>${e.type}</td><td>${e.debit}</td><td>${e.credit}</td></tr>`;
totalD+=e.debit;
totalC+=e.credit;
});
document.getElementById("totalDebit").innerText=totalD;
document.getElementById("totalCredit").innerText=totalC;
}
renderERP();

// --- Tasks ---
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]"); let editTaskIndex=-1;
function addTask(){const txt=document.getElementById("taskInput").value; const client=document.getElementById("taskClient").value; const date=document.getElementById("taskDate").value; const stage=document.getElementById("taskStage").value; if(!txt.trim() || !client.trim()) return alert("أدخل نص المهمة واسم العميل"); const task={txt,client,date,stage}; if(editTaskIndex===-1) tasks.push(task); else {tasks[editTaskIndex]=task; editTaskIndex=-1;} localStorage.setItem("tasks",JSON.stringify(tasks)); document.getElementById("taskInput").value=""; document.getElementById("taskClient").value=""; document.getElementById("taskDate").value=""; renderTasks(); showNotification("✅ تم إضافة/تعديل المهمة");}
function editTask(i){const t=tasks[i]; document.getElementById("taskInput").value=t.txt; document.getElementById("taskClient").value=t.client; document.getElementById("taskDate").value=t.date; document.getElementById("taskStage").value=t.stage; editTaskIndex=i; showNotification("✏️ تعديل المهمة");}
function deleteTask(i){tasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); showNotification("❌ تم حذف المهمة");}
function renderTasks(){const list=document.getElementById("taskList"); list.innerHTML=""; tasks.forEach((t,i)=>{ let stageClass=t.stage==="quote"?"stage-quote":t.stage==="follow"?"stage-follow":"stage-order"; list.innerHTML+=`<li><strong>${t.client}</strong> | ${t.date} | <span class="task-stage ${stageClass}">${t.stage}</span><br>${t.txt}<br><button onclick="editTask(${i})">✏️</button> <button onclick="deleteTask(${i})">❌</button></li>`;});}
renderTasks();

// --- Excel ---
let excelData=[];
function handleFile(e){const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(event){try{const data=new Uint8Array(event.target.result); const workbook=XLSX.read(data,{type:'array'}); const firstSheet=workbook.SheetNames[0]; excelData=XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet],{defval:""}); renderExcel(); showNotification("✅ تم تحميل ملف Excel");}catch(err){alert("خطأ في قراءة ملف Excel"); console.error(err);}}; reader.readAsArrayBuffer(file);}
function renderExcel(){const table=document.getElementById("excelTable"); table.innerHTML=""; if(excelData.length===0){ table.innerHTML="<tr><td colspan='20'>لا توجد بيانات</td></tr>"; return; } const headers=Object.keys(excelData[0]); let tr=document.createElement("tr"); headers.forEach(h=>tr.innerHTML+=`<th>${h}</th>`); table.appendChild(tr); excelData.forEach(row=>{let tr=document.createElement("tr"); headers.forEach(h=>{tr.innerHTML+=`<td contenteditable="true">${row[h]}</td>`;}); table.appendChild(tr);});}
function saveExcelData(){const table=document.getElementById("excelTable"); excelData=[]; for(let i=1;i<table.rows.length;i++){let row={}; for(let j=0;j<table.rows[i].cells.length;j++){row[table.rows[0].cells[j].innerText]=table.rows[i].cells[j].innerText;} excelData.push(row);} localStorage.setItem("excelData",JSON.stringify(excelData)); showNotification("💾 تم حفظ بيانات Excel داخل البرنامج");}
function exportExcelFile(){const table=document.getElementById("excelTable"); let wb=XLSX.utils.book_new(); let ws=XLSX.utils.table_to_sheet(table); XLSX.utils.book_append_sheet(wb,ws,"Sheet1"); XLSX.writeFile(wb,"export.xlsx");}
function loadStoredExcel(){const stored=localStorage.getItem("excelData"); if(stored){excelData=JSON.parse(stored); renderExcel();}}
window.addEventListener("DOMContentLoaded", ()=>{renderERP(); renderCRM(); renderTasks(); loadStoredExcel();});

// --- Language ---
function changeLang(val){alert("Language switched to "+val);}
</script>

</body>
</html>
