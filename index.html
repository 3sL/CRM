<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM Full - Firestore Version</title>
<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1000px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, textarea, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; }
.row > * { flex:1; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
.stats { display:flex; gap:10px; margin-top:10px;}
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; }
</style>
</head>
<body>

<div class="container">
<div style="text-align:center; margin-bottom:10px;">
  <img src="logo.png" alt="Company Logo" style="height:80px;">
</div>

<div style="text-align:right; margin-bottom:15px;">
  Developed by: <strong>Mahmoud Mohamed Marie</strong> 👋<br>
  Phone: <strong>01222153415</strong>
</div>

<h2>📊 CRM Customer Management For Utopia Trading</h2>

<div class="row">
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="date" id="date">
</div>

<div class="row">
<select id="status">
<option value="Interested">Interested</option>
<option value="In Progress">In Progress</option>
<option value="Completed">Completed</option>
</select>
<input type="text" id="notes" placeholder="Notes">
</div>

<button onclick="addOrUpdate()">💾 Save</button>

<hr>

<div class="row">
<input type="text" id="search" placeholder="🔍 Search..." onkeyup="render()">
<select id="filter" onchange="render()">
<option value="">All Statuses</option>
<option value="Interested">Interested</option>
<option value="In Progress">In Progress</option>
<option value="Completed">Completed</option>
</select>
</div>

<div class="stats">
<div class="card" id="total"></div>
<div class="card" id="interested"></div>
<div class="card" id="working"></div>
<div class="card" id="done"></div>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Date</th>
<th>Status</th>
<th>Notes</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

  // =======================
  // 1️⃣ Firebase Config
  // =======================
  const firebaseConfig = {
    apiKey: "AIzaSyBug4T4JIrLRCv6dNm7vdSFMD-KFC6mI0g",
    authDomain: "crm-app-7733a.firebaseapp.com",
    projectId: "crm-app-7733a",
    storageBucket: "crm-app-7733a.firebasestorage.app",
    messagingSenderId: "87718820034",
    appId: "1:87718820034:web:fe6127bb92917ab4c2235b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const clientsCol = collection(db, "clients");

  let editId = null;

  // =======================
  // 2️⃣ Add / Update Client
  // =======================
  async function addOrUpdate() {
    const client = {
      name: nameInput.value,
      phone: phoneInput.value,
      date: dateInput.value,
      status: statusInput.value,
      notes: notesInput.value
    };

    if (!client.name || !client.phone) {
      alert("Please fill in all required fields");
      return;
    }

    try {
      if (editId) {
        const clientDoc = doc(db, "clients", editId);
        await updateDoc(clientDoc, client);
        editId = null;
      } else {
        await addDoc(clientsCol, client);
      }
      clearForm();
      render();
    } catch (e) {
      console.error("Error saving client: ", e);
    }
  }

  // =======================
  // 3️⃣ Delete Client
  // =======================
  async function deleteClient(id) {
    if (confirm("Are you sure you want to delete this client?")) {
      await deleteDoc(doc(db, "clients", id));
      render();
    }
  }

  // =======================
  // 4️⃣ Edit Client
  // =======================
  async function editClient(id) {
    const clientDoc = doc(db, "clients", id);
    const snapshot = await getDocs(clientsCol);
    snapshot.forEach(docSnap => {
      if (docSnap.id === id) {
        const c = docSnap.data();
        nameInput.value = c.name;
        phoneInput.value = c.phone;
        dateInput.value = c.date;
        statusInput.value = c.status;
        notesInput.value = c.notes;
        editId = id;
      }
    });
  }

  // =======================
  // 5️⃣ Clear Form
  // =======================
  function clearForm() {
    nameInput.value = "";
    phoneInput.value = "";
    dateInput.value = "";
    notesInput.value = "";
    editId = null;
  }

  // =======================
  // 6️⃣ Render Table
  // =======================
  async function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    const table = document.getElementById("table");
    table.innerHTML = "";

    let total = 0, interested = 0, working = 0, done = 0;

    const snapshot = await getDocs(clientsCol);
    snapshot.forEach(docSnap => {
      const c = docSnap.data();
      c.id = docSnap.id;
      if (
        (c.name.toLowerCase().includes(search) || c.phone.includes(search)) &&
        (filter === "" || c.status === filter)
      ) {
        total++;
        if (c.status === "Interested") interested++;
        if (c.status === "In Progress") working++;
        if (c.status === "Completed") done++;

        table.innerHTML += `
          <tr>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.date}</td>
            <td>${c.status}</td>
            <td>${c.notes}</td>
            <td>
              <button onclick="editClient('${c.id}')">✏️</button>
              <button onclick="deleteClient('${c.id}')">❌</button>
            </td>
          </tr>
        `;
      }
    });

    document.getElementById("total").innerText = "👥 Total: " + total;
    document.getElementById("interested").innerText = "🎯 Interested: " + interested;
    document.getElementById("working").innerText = "🔧 In Progress: " + working;
    document.getElementById("done").innerText = "✅ Completed: " + done;
  }

  // =======================
  // 7️⃣ Inputs
  // =======================
  const nameInput = document.getElementById("name");
  const phoneInput = document.getElementById("phone");
  const dateInput = document.getElementById("date");
  const statusInput = document.getElementById("status");
  const notesInput = document.getElementById("notes");

  // Initial render
  render();
</script>

</body>
</html>
