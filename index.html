<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System - Utopia</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== Theme ===== */
:root {
  --main:#007bff;
  --bg:#f7f8fa;
  --card:#fff;
  --text:#222;
}

.dark {
  --bg:#1e1e2f;
  --card:#2c2c3e;
  --text:#fff;
}

body {
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  margin:0;
  color:var(--text);
}

.container {
  max-width:1200px;
  margin:20px auto;
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

/* Header */
.header {
  text-align:center;
}

/* Buttons */
button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

/* Tabs */
.tabs {
  display:flex;
  gap:10px;
  margin:15px 0;
}

.tab-btn {
  flex:1;
  background:#ddd;
}

.tab-btn.active {
  background:var(--main);
  color:#fff;
}

.tab-content {display:none;}
.tab-content.active {display:block;}

/* Grid */
.row {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

input,select {
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* Table */
table {
  width:100%;
  margin-top:15px;
}

th {
  background:var(--main);
  color:#fff;
}

/* Cards */
.stats {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.card {
  flex:1;
  background:var(--main);
  color:#fff;
  padding:10px;
  border-radius:8px;
}

/* Tasks */
#taskList li {
  background:#eee;
  margin:5px;
  padding:8px;
  border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
  <h2>CRM & ERP System</h2>
</div>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<!-- Search -->

<input id="search" placeholder="🔍 بحث..." onkeyup="renderTable()">

<!-- Tabs -->

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('crmTab',this)">CRM</button>
  <button class="tab-btn" onclick="showTab('tasksTab',this)">Tasks</button>
  <button class="tab-btn" onclick="showTab('erpTab',this)">ERP</button>
</div>

<!-- CRM -->

<div id="crmTab" class="tab-content active">

<div class="row">
  <input id="name" placeholder="اسم العميل">
  <input id="phone" placeholder="رقم الهاتف">
  <select id="status">
    <option>Interested</option>
    <option>Hold</option>
    <option>Done</option>
  </select>
</div>

<button onclick="addClient()">💾 حفظ</button>

<div class="stats">
  <div class="card" id="total">0</div>
  <div class="card" id="hold">0</div>
</div>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>الحالة</th>
<th>واتساب</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- Tasks -->

<div id="tasksTab" class="tab-content">
<div class="row">
  <input id="taskInput">
  <button onclick="addTask()">+</button>
</div>
<ul id="taskList"></ul>
</div>

<!-- ERP -->

<div id="erpTab" class="tab-content">
<h3>ERP بسيط</h3>
<div class="row">
  <input placeholder="الوصف">
  <input type="number" placeholder="المبلغ">
</div>
<button>حفظ</button>
</div>

</div>

<script>

/* LocalStorage */
let clients = JSON.parse(localStorage.getItem("clients")||"[]");

/* Tabs */
function showTab(id,btn){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

/* Add Client */
function addClient(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let status=document.getElementById("status").value;

  if(!name) return;

  clients.push({name,phone,status});
  saveData();
}

/* Save */
function saveData(){
  localStorage.setItem("clients",JSON.stringify(clients));
  renderTable();
}

/* Delete */
function deleteClient(i){
  clients.splice(i,1);
  saveData();
}

/* Render */
function renderTable(){
  let table=document.getElementById("table");
  let search=document.getElementById("search").value.toLowerCase();

  table.innerHTML="";
  let holdCount=0;

  clients
  .filter(c=>c.name.toLowerCase().includes(search))
  .forEach((c,i)=>{
    if(c.status=="Hold") holdCount++;

    table.innerHTML+=`
    <tr>
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.status}</td>
      <td><a href="https://wa.me/${c.phone}" target="_blank">📱</a></td>
      <td><button onclick="deleteClient(${i})">❌</button></td>
    </tr>
    `;
  });

  document.getElementById("total").innerText="Total: "+clients.length;
  document.getElementById("hold").innerText="Hold: "+holdCount;
}

/* Tasks */
function addTask(){
  let input=document.getElementById("taskInput");
  let li=document.createElement("li");
  li.textContent=input.value;
  document.getElementById("taskList").appendChild(li);
  input.value="";
}

/* Dark Mode */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* Init */
renderTable();

</script>

</body>
</html>
