<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Advanced CRM System</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== Theme ===== */
:root {
  --main: #007bff;
  --bg: #f4f6f9;
  --card: #fff;
  --text: #222;
}

.dark {
  --bg: #1e1e2f;
  --card: #2c2c3e;
  --text: #fff;
}

body {
  font-family: 'Cairo';
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

/* ===== Layout ===== */
.container {
  max-width: 1100px;
  margin: 20px auto;
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== Buttons ===== */
button {
  background: var(--main);
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== Tabs ===== */
.tabs {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

.tab-btn {
  flex: 1;
  padding: 10px;
  background: #ddd;
}

.tab-btn.active {
  background: var(--main);
  color: #fff;
}

.tab-content { display:none; }
.tab-content.active { display:block; }

/* ===== Grid ===== */
.row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 10px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* ===== Table ===== */
table {
  width: 100%;
  margin-top: 15px;
}

th {
  background: var(--main);
  color: #fff;
}

td, th {
  padding: 8px;
  text-align: center;
}

/* ===== Cards ===== */
.stats {
  display: flex;
  gap: 10px;
}

.card {
  flex: 1;
  background: var(--main);
  color: #fff;
  padding: 10px;
  border-radius: 10px;
}

/* ===== Task ===== */
li {
  background: #ddd;
  margin: 5px;
  padding: 8px;
  border-radius: 6px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
  <h2>🚀 Advanced CRM</h2>
  <button onclick="toggleDark()">🌙</button>
</div>

<!-- Search -->

<input id="search" placeholder="🔍 بحث..." onkeyup="render()">

<!-- Tabs -->

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('crm',this)">CRM</button>
  <button class="tab-btn" onclick="showTab('tasks',this)">Tasks</button>
</div>

<!-- CRM -->

<div id="crm" class="tab-content active">

<div class="row">
  <input id="name" placeholder="اسم العميل">
  <input id="phone" placeholder="رقم الهاتف">
  <select id="status">
    <option>Interested</option>
    <option>Hold</option>
    <option>Done</option>
  </select>
</div>

<button onclick="addClient()">💾 حفظ</button>

<div class="stats">
  <div class="card" id="total"></div>
  <div class="card" id="hold"></div>
</div>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>الحالة</th>
<th>واتساب</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- Tasks -->

<div id="tasks" class="tab-content">

<div class="row">
  <input id="taskInput">
  <button onclick="addTask()">+</button>
</div>

<ul id="tasksList"></ul>

</div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients")||"[]");

/* Tabs */
function showTab(id,btn){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

/* Add */
function addClient(){
  let name=nameInput.value;
  let phone=phoneInput.value;
  let status=status.value;

  clients.push({name,phone,status});
  save();
}

/* Save */
function save(){
  localStorage.setItem("clients",JSON.stringify(clients));
  render();
}

/* Delete */
function del(i){
  clients.splice(i,1);
  save();
}

/* Render */
function render(){
  let search=searchInput.value.toLowerCase();
  table.innerHTML="";
  let hold=0;

  clients
  .filter(c=>c.name.toLowerCase().includes(search))
  .forEach((c,i)=>{
    if(c.status=="Hold") hold++;

    table.innerHTML+=`
    <tr>
    <td>${c.name}</td>
    <td>${c.phone}</td>
    <td>${c.status}</td>
    <td><a href="https://wa.me/${c.phone}" target="_blank">📱</a></td>
    <td><button onclick="del(${i})">❌</button></td>
    </tr>
    `;
  });

  total.innerText="Total: "+clients.length;
  holdBox.innerText="Hold: "+hold;
}

/* Tasks */
function addTask(){
  let li=document.createElement("li");
  li.textContent=taskInput.value;
  tasksList.appendChild(li);
  taskInput.value="";
}

/* Dark Mode */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* Init */
render();

</script>

</body>
</html>
