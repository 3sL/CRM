<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System</title>

<style>
/* عام */
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0; }
.container { max-width:1400px; margin:auto; background:#fff; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); display:flex; flex-direction:row; min-height:100vh; }
.sidebar { width:250px; background:#2c3e50; color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; }
.sidebar h2 { text-align:center; margin-bottom:20px; }
.sidebar button { padding:10px; margin:5px 0; background:#34495e; border:none; cursor:pointer; color:#fff; border-radius:5px; text-align:right; }
.sidebar button.active { background:#1abc9c; color:#fff; }
.main { flex:1; padding:20px; box-sizing:border-box; overflow:auto; }
.header { text-align:center; margin-bottom:20px; }
.header img { height:100px; width:auto; margin-bottom:10px; }
.developer, .phone { text-align:center; font-size:14px; margin:2px 0; color:#555; }
input, select, button, textarea { padding:10px; margin:5px 0; width:100%; box-sizing:border-box; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#34495e; color:#fff; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:150px; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; padding:15px; border-radius:10px; display:none; z-index:999; }
.holdRow { background:#fff3cd; }
.erp-form { background:#f9f9f9; padding:15px; border-radius:8px; margin-top:10px; }
textarea { min-height:60px; resize:vertical; }
@media (max-width:900px){
    .container { flex-direction:column; }
    .sidebar { width:100%; flex-direction:row; overflow-x:auto; }
    .sidebar button { flex:1; margin:0 5px; }
}
</style>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>
<body>

<div id="notification"></div>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>CRM & ERP</h2>
<button class="active" onclick="showTab('crmTab', this)">CRM</button>
<button onclick="showTab('tasksTab', this)">Tasks</button>
<button onclick="showTab('erpTab', this)">ERP</button>
<button onclick="showTab('excelTab', this)">Excel</button>
</div>

<!-- Main content -->
<div class="main">
<div class="header">
<img src="logo.png" alt="Company Logo">
</div>
<div class="developer">Developed by Eng: <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>

<!-- CRM -->
<div id="crmTab" class="tab-content active">
<h2>CRM System</h2>
<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<textarea id="notes" placeholder="ملاحظات"></textarea>
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>
<button onclick="addOrUpdate()">💾 حفظ</button>
<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- Tasks -->
<div id="tasksTab" class="tab-content">
<h2>Tasks</h2>
<div class="row">
<input id="taskInput" placeholder="نص المهمة">
<input type="date" id="taskDate">
<select id="taskStage">
<option>تقديم عرض سعر</option>
<option>متابعة عرض السعر</option>
<option>أمر توريد</option>
</select>
<input id="taskClient" placeholder="اسم العميل">
<button onclick="addTask()">➕ إضافة</button>
</div>
<ul id="taskList"></ul>
</div>

<!-- ERP -->
<div id="erpTab" class="tab-content">
<h2>ERP Accounting</h2>
<div class="erp-form">
<table id="accountingTable">
<thead>
<tr><th>الحساب</th><th>مدين</th><th>دائن</th></tr>
</thead>
<tbody>
<tr>
<td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option><option>المشتريات</option><option>عهدة</option><option>مديونية</option></select></td>
<td><input type="number" placeholder="0.00"></td>
<td><input type="number" placeholder="0.00"></td>
</tr>
</tbody>
</table>
<button onclick="addAccountingRow()">+ إضافة سطر</button>
<button onclick="submitAccountingForm()">💾 حفظ القيد</button>
<button onclick="exportERPExcel()">📊 تصدير Excel</button>
<input type="file" id="erpExcelFile" accept=".xlsx, .xls" onchange="importERPExcel(event)">
</div>
<div class="stats">
<div class="card" id="totalCash">إجمالي الصندوق: 0</div>
<div class="card" id="totalBank">إجمالي البنك: 0</div>
<div class="card" id="totalFinal">الإجمالي النهائي: 0</div>
</div>
</div>

<!-- Excel -->
<div id="excelTab" class="tab-content">
<h2>Excel</h2>
<input type="file" id="excelFile" accept=".xlsx, .xls" onchange="handleFile(event)">
<button onclick="exportExcelFile()">📊 تصدير Excel</button>
<table id="excelTable"></table>
</div>

</div>
</div>

<script>
// Tabs
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// Notification
function showNotification(msg){
const n=document.getElementById("notification");
n.innerText=msg;
n.style.display="block";
setTimeout(()=>n.style.display="none",3000);
}

// CRM
let clients=JSON.parse(localStorage.getItem("clients")||"[]");
let editIndex = -1;
function addOrUpdate(){
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const reminderEl=document.getElementById("reminderDays");
if(!nameEl.value.trim() || !phoneEl.value.trim()){
alert("⚠️ أدخل البيانات");
return;
}
const clientData={name:nameEl.value, phone:phoneEl.value, date:dateEl.value, status:statusEl.value, notes:notesEl.value};
if(editIndex===-1){ clients.push(clientData); }else{ clients[editIndex]=clientData; editIndex=-1; }
localStorage.setItem("clients", JSON.stringify(clients));
nameEl.value=""; phoneEl.value=""; dateEl.value=""; notesEl.value=""; reminderEl.value="";
renderCRM();
}
function editClient(i){
const c=clients[i];
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
document.getElementById("date").value=c.date;
document.getElementById("status").value=c.status;
document.getElementById("notes").value=c.notes;
editIndex=i;
showNotification("✏️ تعديل العميل");
}
function deleteClient(i){ clients.splice(i,1); localStorage.setItem("clients", JSON.stringify(clients)); renderCRM();}
function openWhatsApp(phone){ window.open(`https://wa.me/${phone}`,'_blank'); }
function renderCRM(){
const table=document.getElementById("table");
table.innerHTML="";
let holdCount=0;
clients.forEach((c,i)=>{
let rowClass=c.status==="Hold"?"holdRow":"";
if(c.status==="Hold"){ holdCount++; }
table.innerHTML += `<tr class="${rowClass}">
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.date}</td>
<td>${c.status}</td>
<td>${c.notes}</td>
<td>-</td>
<td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
<td><button onclick="editClient(${i})">✏️</button></td>
<td><button onclick="deleteClient(${i})">❌</button></td>
</tr>`;
});
document.getElementById("total").innerText="Total: "+clients.length;
document.getElementById("hold").innerText="Hold: "+holdCount;
}
renderCRM();

// Tasks
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let editTaskIndex=-1;
function addTask(){
const taskInput=document.getElementById("taskInput");
const taskDate=document.getElementById("taskDate");
const taskStage=document.getElementById("taskStage");
const taskClient=document.getElementById("taskClient");
if(!taskInput.value.trim()){ alert("⚠️ أدخل نص المهمة"); return; }
const taskData={text:taskInput.value,date:taskDate.value,stage:taskStage.value,client:taskClient.value};
if(editTaskIndex===-1){ tasks.push(taskData); }else{ tasks[editTaskIndex]=taskData; editTaskIndex=-1; }
localStorage.setItem("tasks", JSON.stringify(tasks));
taskInput.value=""; taskDate.value=""; taskClient.value="";
renderTasks();
}
function editTask(i){
const t=tasks[i];
document.getElementById("taskInput").value=t.text;
document.getElementById("taskDate").value=t.date;
document.getElementById("taskStage").value=t.stage;
document.getElementById("taskClient").value=t.client;
editTaskIndex=i;
showNotification("✏️ تعديل المهمة");
}
function deleteTask(i){ tasks.splice(i,1); localStorage.setItem("tasks", JSON.stringify(tasks)); renderTasks(); }
function renderTasks(){
const ul=document.getElementById("taskList"); ul.innerHTML="";
tasks.forEach((t,i)=>{
let color="#f0f2f5"; 
if(t.stage==="تقديم عرض سعر") color="#ffe4b2"; 
else if(t.stage==="متابعة عرض السعر") color="#b2d8ff"; 
else if(t.stage==="أمر توريد") color="#b2ffb2";
ul.innerHTML += `<li style="background:${color}; padding:5px; margin:5px; border-radius:5px;">
<strong>${t.client}</strong> | ${t.date} | ${t.stage} | ${t.text}
<button onclick="editTask(${i})">✏️</button>
<button onclick="deleteTask(${i})">❌</button>
</li>`;
});
}
renderTasks();

// ERP
let accountingEntries=JSON.parse(localStorage.getItem("accountingEntries")||"[]");
function addAccountingRow(){
const table=document.getElementById("accountingTable").querySelector("tbody");
const row=document.createElement("tr");
row.innerHTML=`<td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option><option>المشتريات</option><option>عهدة</option><option>مديونية</option></select></td>
<td><input type="number" placeholder="0.00"></td>
<td><input type="number" placeholder="0.00"></td>`;
table.appendChild(row);
}
function submitAccountingForm(){
const table=document.getElementById("accountingTable").querySelector("tbody");
accountingEntries=[];
table.querySelectorAll("tr").forEach(tr=>{
const account=tr.cells[0].querySelector("select").value;
const debit=parseFloat(tr.cells[1].querySelector("input").value)||0;
const credit=parseFloat(tr.cells[2].querySelector("input").value)||0;
accountingEntries.push({account,debit,credit});
});
localStorage.setItem("accountingEntries", JSON.stringify(accountingEntries));
calculateERP();
showNotification("💾 بيانات ERP محفوظة");
}
function calculateERP(){
let totalCash=0, totalBank=0;
accountingEntries.forEach(e=>{
if(e.account==="الصندوق") totalCash+=e.debit-e.credit;
if(e.account==="البنك") totalBank+=e.debit-e.credit;
});
document.getElementById("totalCash").innerText="إجمالي الصندوق: "+totalCash.toFixed(2);
document.getElementById("totalBank").innerText="إجمالي البنك: "+totalBank.toFixed(2);
document.getElementById("totalFinal").innerText="الإجمالي النهائي: "+(totalCash+totalBank).toFixed(2);
}
calculateERP();
function exportERPExcel(){
let wb=XLSX.utils.book_new();
let ws_data=[["الحساب","مدين","دائن"]];
accountingEntries.forEach(e=>ws_data.push([e.account,e.debit,e.credit]));
let ws=XLSX.utils.aoa_to_sheet(ws_data);
XLSX.utils.book_append_sheet(wb,ws,"ERP");
XLSX.writeFile(wb,"ERP_Data.xlsx");
}
function importERPExcel(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result);
const wb=XLSX.read(data,{type:"array"});
const ws=wb.Sheets[wb.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(ws,{header:1});
const tbody=document.getElementById("accountingTable").querySelector("tbody");
tbody.innerHTML="";
rows.slice(1).forEach(r=>{
const tr=document.createElement("tr");
tr.innerHTML=`<td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option><option>المشتريات</option><option>عهدة</option><option>مديونية</option></select></td>
<td><input type="number" value="${r[1]||0}"></td>
<td><input type="number" value="${r[2]||0}"></td>`;
tr.cells[0].querySelector("select").value=r[0]||"الصندوق";
tbody.appendChild(tr);
});
}

// Excel
function handleFile(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result);
const wb=XLSX.read(data,{type:"array"});
const ws=wb.Sheets[wb.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(ws,{header:1});
const table=document.getElementById("excelTable");
table.innerHTML="";
json.forEach((row,i)=>{
const tr=document.createElement("tr");
row.forEach(cell=>{ const td=document.createElement("td"); td.innerText=cell; tr.appendChild(td); });
table.appendChild(tr);
});
};
reader.readAsArrayBuffer(file);
}
function exportExcelFile(){
let table=document.getElementById("excelTable");
let wb=XLSX.utils.book_new();
let ws_data=[];
table.querySelectorAll("tr").forEach(tr=>{
let row=[];
tr.querySelectorAll("td").forEach(td=>row.push(td.innerText));
ws_data.push(row);
});
let ws=XLSX.utils.aoa_to_sheet(ws_data);
XLSX.utils.book_append_sheet(wb,ws,"ExcelData");
XLSX.writeFile(wb,"ExcelData.xlsx");
}
</script>

</body>
</html>
