<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System Management For Utopia Trading And Export</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
button { cursor:pointer; }
.stats { display:flex; gap:10px; flex-wrap:wrap; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px;}
#map { height:300px; margin-top:10px; border-radius:10px;}
.holdRow { background:#fff3cd; }

.logo { height:200px; display:block; margin:auto; }
.developer { text-align:right; margin:10px 0; font-size:14px;}
.phone { text-align:right; margin-bottom:10px; font-size:14px;}

#notification {
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
padding:15px;
border-radius:10px;
display:none;
z-index:999;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div id="notification"></div>

<div class="container">

<img src="logo.png" class="logo">
<div class="developer">تم التطوير بواسطة Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 01222153415</div>

<h2 id="title">CRM System Management For Utopia Trading And Export</h2>
<button onclick="toggleLang()">🌐 عربي / English</button>

<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">

<select id="status">
<option value="Interested">Interested</option>
<option value="In Progress">In Progress</option>
<option value="Hold">Hold</option>
<option value="Completed">Completed</option>
</select>

<input id="notes" placeholder="ملاحظات">
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
<input id="tasks" placeholder="Tasks">
</div>

<div class="row">
<button onclick="startTracking()">📍 بدء التتبع</button>
<button onclick="stopTracking()">⛔ إيقاف</button>
<button onclick="addOrUpdate()">💾 حفظ</button>
<button onclick="exportExcel()">📊 Excel Export</button>
<input type="file" id="importExcel" accept=".xlsx,.xls"/>
</div>

<div class="stats">
<div class="card" id="total">👥 إجمالي: 0</div>
<div class="card" id="hold">⚠️ Hold: 0</div>
</div>

<div id="map"></div>

<table>
<thead>
<tr>
<th id="thName">الاسم</th>
<th id="thPhone">الهاتف</th>
<th id="thDate">التاريخ</th>
<th id="thStatus">الحالة</th>
<th id="thNotes">ملاحظات</th>
<th>Tasks</th>
<th>Reminder</th>
<th>WhatsApp</th>
<th>Location</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBug4T4JIrLRCv6dNm7vdSFMD-KFC6mI0g",
  authDomain: "crm-app-7733a.firebaseapp.com",
  projectId: "crm-app-7733a",
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db,"clients");

// عناصر
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const agentEl=document.getElementById("agent");
const reminderEl=document.getElementById("reminderDays");
const tasksEl=document.getElementById("tasks");
const table=document.getElementById("table");
const importInput=document.getElementById("importExcel");

let lang="ar";
let editId=null;

// 🌐 اللغة
window.toggleLang=()=>{
  lang = lang==="ar"?"en":"ar";
  updateUIText();
  render();
}
function updateUIText(){
  nameEl.placeholder = lang==="ar"?"اسم العميل":"Customer Name";
  phoneEl.placeholder = lang==="ar"?"رقم الهاتف":"Phone";
  notesEl.placeholder = lang==="ar"?"ملاحظات":"Notes";
  agentEl.placeholder = lang==="ar"?"اسم المندوب":"Agent";
  reminderEl.placeholder = lang==="ar"?"Reminder بالأيام":"Reminder Days";
  tasksEl.placeholder = lang==="ar"?"Tasks":"Tasks";

  document.getElementById("thName").innerText = lang==="ar"?"الاسم":"Name";
  document.getElementById("thPhone").innerText = lang==="ar"?"الهاتف":"Phone";
  document.getElementById("thDate").innerText = lang==="ar"?"التاريخ":"Date";
  document.getElementById("thStatus").innerText = lang==="ar"?"الحالة":"Status";
  document.getElementById("thNotes").innerText = lang==="ar"?"ملاحظات":"Notes";

  statusEl.innerHTML = `
  <option value="Interested">${lang==="ar"?"مهتم":"Interested"}</option>
  <option value="In Progress">${lang==="ar"?"قيد التنفيذ":"In Progress"}</option>
  <option value="Hold">${lang==="ar"?"معلق":"Hold"}</option>
  <option value="Completed">${lang==="ar"?"مكتمل":"Completed"}</option>`;
}
updateUIText();

// 🔔 Notification
function showNotification(msg){
  const n=document.getElementById("notification");
  n.innerText=msg;
  n.style.display="block";
  n.onclick=()=>n.style.display="none";
  setTimeout(()=>n.style.display="none",5000);
}

// 🗺️ Map
let map=L.map('map').setView([30.0444,31.2357],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker=L.marker([30.0444,31.2357],{draggable:true}).addTo(map);
let currentLocation=null;
marker.on('dragend', e=>{
  const p=marker.getLatLng();
  currentLocation={lat:p.lat,lng:p.lng};
});

// ➕ ADD / UPDATE
window.addOrUpdate=async ()=>{
  if(!nameEl.value || !phoneEl.value){
    alert("أدخل البيانات");
    return;
  }

  const now=new Date();
  const reminderDate = reminderEl.value
    ? new Date(now.getTime()+reminderEl.value*86400000)
    : null;

  const data={
    name:nameEl.value,
    phone:phoneEl.value,
    date:dateEl.value,
    status:statusEl.value,
    notes:notesEl.value,
    agent:agentEl.value,
    location:currentLocation,
    tasks: tasksEl.value,
    reminderDate: reminderDate ? reminderDate.toISOString() : null
  };

  if(editId){
    await updateDoc(doc(db,"clients",editId),data);
    editId=null;
  }else{
    await addDoc(colRef,data);
  }

  clearForm();
  render();
}

// ✏️ EDIT
window.editClient=async(id)=>{
  const d=await getDoc(doc(db,"clients",id));
  if(d.exists()){
    const c=d.data();
    nameEl.value=c.name;
    phoneEl.value=c.phone;
    dateEl.value=c.date;
    statusEl.value=c.status;
    notesEl.value=c.notes;
    agentEl.value=c.agent;
    tasksEl.value=c.tasks||"";
    if(c.reminderDate){
      const diff=Math.ceil((new Date(c.reminderDate)-new Date())/86400000);
      reminderEl.value=diff>0?diff:0;
    }
    editId=id;
  }
}

// 🗑️ DELETE
window.deleteClient=async(id)=>{
  await deleteDoc(doc(db,"clients",id));
  render();
}

// 📱 WhatsApp
window.openWhatsApp=function(phone){
  phone = phone.replace(/^0/, "20");
  let msg = "مرحبا، بخصوص طلبك.";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
}

// ⏰ Reminder
function checkReminder(c){
  if(!c.reminderDate) return "";
  const now = new Date();
  const rDate = new Date(c.reminderDate);
  if(now >= rDate){
    showNotification(`⏰ Reminder: ${c.name}`);
    return "⚠️";
  }
  return "";
}

// 🎨 RENDER
async function render(){
  table.innerHTML="";
  let holdCount=0;
  const snap=await getDocs(colRef);
  snap.forEach(d=>{
    const c=d.data();
    if(c.status==="Hold"){ holdCount++; showNotification(`⚠️ Hold: ${c.name}`); }
    let rowClass=c.status==="Hold"?"holdRow":"";
    let reminder=checkReminder(c);

    table.innerHTML+=`
    <tr class="${rowClass}">
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.date}</td>
      <td>${c.status}</td>
      <td>${c.notes}</td>
      <td>${c.tasks||""}</td>
      <td>${reminder}</td>
      <td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
      <td>${c.location?`🌍`:"-"}</td>
      <td><button onclick="editClient('${d.id}')">✏️</button></td>
      <td><button onclick="deleteClient('${d.id}')">❌</button></td>
    </tr>`;
  });
  document.getElementById("total").innerText=`👥 إجمالي: ${snap.size}`;
  document.getElementById("hold").innerText=`⚠️ Hold: ${holdCount}`;
}

// 🧹 CLEAR FORM
function clearForm(){
  nameEl.value="";
  phoneEl.value="";
  dateEl.value="";
  notesEl.value="";
  agentEl.value="";
  tasksEl.value="";
  reminderEl.value="";
}

// TRACKING
let watchId;
window.startTracking=()=>{ watchId = navigator.geolocation.watchPosition(pos=>{ const lat=pos.coords.latitude, lng=pos.coords.longitude; currentLocation={lat,lng}; marker.setLatLng([lat,lng]); map.setView([lat,lng],13); });}
window.stopTracking=()=>{ navigator.geolocation.clearWatch(watchId); }

// 📊 Excel Export
window.exportExcel = async ()=>{
  const snap = await getDocs(colRef);
  const data = [];
  const headers = ["Name","Phone","Date","Status","Notes","Tasks","Agent","Reminder","Lat","Lng"];
  data.push(headers);
  snap.forEach(d=>{
    const c = d.data();
    data.push([
      c.name||"", c.phone||"", c.date||"", c.status||"", c.notes||"",
      c.tasks||"", c.agent||"", c.reminderDate||"",
      c.location?.lat||"", c.location?.lng||""
    ]);
  });
  const worksheet = XLSX.utils.aoa_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Clients");
  XLSX.writeFile(workbook, "clients.xlsx");
}

// 📥 Excel Import
importInput.addEventListener("change", async(e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet);
  for(let r of rows){
    await addDoc(colRef,{
      name: r.Name || "",
      phone: r.Phone || "",
      date: r.Date || "",
      status: r.Status || "Interested",
      notes: r.Notes || "",
      tasks: r.Tasks || "",
      agent: r.Agent || "",
      reminderDate: r.Reminder || null
    });
  }
  render();
});

render();
</script>

</body>
</html>
