<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
button { cursor:pointer; }
</style>
</head>
<body>

<div class="container">

<button onclick="toggleLang()">🌐 عربي / English</button>

<h2 id="title"></h2>

<div class="row">
<input id="name">
<input id="phone">
<select id="status"></select>
<input id="agent">
</div>

<button onclick="addOrUpdate()" id="saveBtn"></button>

<div id="map" style="height:300px;"></div>

<table>
<thead>
<tr>
<th id="thName"></th>
<th id="thPhone"></th>
<th id="thStatus"></th>
<th id="thAgent"></th>
<th id="thEdit"></th>
<th id="thDelete"></th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIza...",
  projectId:"crm-app-7733a"
});

const db = getFirestore(app);
const colRef = collection(db,"clients");

let lang="ar";

// 🌍 الترجمة
const T = {
ar:{
title:"نظام إدارة العملاء",
name:"اسم العميل",
phone:"رقم الهاتف",
agent:"اسم العميل",
status:["مهتم","قيد التنفيذ","مكتمل"],
save:"حفظ",
edit:"تعديل",
del:"حذف",
thName:"الاسم",
thPhone:"الهاتف",
thStatus:"الحالة",
thAgent:"عميل"
},
en:{
title:"CRM System",
name:"Customer Name",
phone:"Phone",
agent:"Customer Name",
status:["Interested","In Progress","Completed"],
save:"Save",
edit:"Edit",
del:"Delete",
thName:"Name",
thPhone:"Phone",
thStatus:"Status",
thAgent:"Customer"
}
};

// عناصر
const name=document.getElementById("name");
const phone=document.getElementById("phone");
const status=document.getElementById("status");
const agent=document.getElementById("agent");
const table=document.getElementById("table");

// 🌍 تطبيق اللغة
function applyLang(){

document.documentElement.dir = lang==="ar"?"rtl":"ltr";

const t=T[lang];

document.getElementById("title").innerText=t.title;

name.placeholder=t.name;
phone.placeholder=t.phone;
agent.placeholder=t.agent;

document.getElementById("saveBtn").innerText=t.save;

document.getElementById("thName").innerText=t.thName;
document.getElementById("thPhone").innerText=t.thPhone;
document.getElementById("thStatus").innerText=t.thStatus;
document.getElementById("thAgent").innerText=t.thAgent;
document.getElementById("thEdit").innerText=t.edit;
document.getElementById("thDelete").innerText=t.del;

// الحالات
status.innerHTML="";
t.status.forEach(s=>{
let o=document.createElement("option");
o.value=s;
o.text=s;
status.appendChild(o);
});

}

// 🔁 تغيير اللغة
window.toggleLang=function(){
lang = lang==="ar"?"en":"ar";
applyLang();
render();
}

// 🗺️ خريطة
let map = L.map('map').setView([30,31],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ➕ إضافة
window.addOrUpdate=async function(){
if(!name.value || !phone.value) return;

await addDoc(colRef,{
name:name.value,
phone:phone.value,
status:status.value,
agent:agent.value
});

name.value=""; phone.value=""; agent.value="";
render();
}

// ❌ حذف
window.deleteClient=async function(id){
await deleteDoc(doc(db,"clients",id));
render();
}

// 📊 عرض
async function render(){
table.innerHTML="";
const snap=await getDocs(colRef);

snap.forEach(d=>{
const c=d.data();

table.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.status}</td>
<td>${c.agent}</td>
<td><button onclick="deleteClient('${d.id}')">✏️</button></td>
<td><button onclick="deleteClient('${d.id}')">❌</button></td>
</tr>`;
});
}

// INIT
applyLang();
render();

</script>

</body>
</html>
