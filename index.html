<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
button { cursor:pointer; }
.lang-btn { width:auto; margin-bottom:15px;}
</style>
</head>
<body>

<div class="container">

<button class="lang-btn" onclick="toggleLang()">🌐 عربي / English</button>

<div class="row">
<input id="name">
<input id="phone">
<select id="status"></select>
<input id="agent">
</div>

<button onclick="addOrUpdate()">💾 Save</button>

<table>
<thead>
<tr>
<th id="thName"></th>
<th id="thPhone"></th>
<th id="thStatus"></th>
<th id="thAgent"></th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIza...",
  projectId: "crm-app-7733a"
});

const db = getFirestore(app);
const colRef = collection(db,"clients");

// ✅ حفظ اللغة
let lang = localStorage.getItem("lang") || "ar";

// ✅ الحالات مترجمة
const statusList = {
  ar: ["مهتم","قيد التنفيذ","مكتمل"],
  en: ["Interested","In Progress","Completed"]
};

// عناصر
const name=document.getElementById("name");
const phone=document.getElementById("phone");
const status=document.getElementById("status");
const agent=document.getElementById("agent");
const table=document.getElementById("table");

// تغيير اللغة
function toggleLang(){
  lang = lang==="ar" ? "en" : "ar";
  localStorage.setItem("lang",lang);
  applyLang();
  render();
}

// تطبيق اللغة
function applyLang(){

  document.documentElement.dir = lang==="ar"?"rtl":"ltr";

  name.placeholder = lang==="ar"?"اسم العميل":"Customer Name";
  phone.placeholder = lang==="ar"?"رقم الهاتف":"Phone";
  agent.placeholder = lang==="ar"?"اسم العميل":"Customer Name";

  document.getElementById("thName").innerText = lang==="ar"?"الاسم":"Name";
  document.getElementById("thPhone").innerText = lang==="ar"?"الهاتف":"Phone";
  document.getElementById("thStatus").innerText = lang==="ar"?"الحالة":"Status";
  document.getElementById("thAgent").innerText = lang==="ar"?"عميل":"Customer";

  // الحالات
  status.innerHTML="";
  statusList[lang].forEach(s=>{
    let o=document.createElement("option");
    o.value=s;
    o.text=s;
    status.appendChild(o);
  });
}

// إضافة
async function addOrUpdate(){
  if(!name.value || !phone.value) return;

  await addDoc(colRef,{
    name:name.value,
    phone:phone.value,
    status:status.value,
    agent:agent.value
  });

  name.value=""; phone.value=""; agent.value="";
  render();
}

// عرض
async function render(){
  table.innerHTML="";
  const snap=await getDocs(colRef);
  snap.forEach(d=>{
    const c=d.data();
    table.innerHTML+=`
    <tr>
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.status}</td>
      <td>${c.agent}</td>
    </tr>`;
  });
}

// INIT
applyLang();
render();

</script>

</body>
</html>
