<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System</title>

<style>
/* ---------- أسلوب عام ---------- */
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0; }
.container { max-width:1400px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
.header { text-align:center; margin-bottom:20px; }
.header img { height:120px; width:auto; margin-bottom:10px; }
.developer, .phone { text-align:center; font-size:14px; margin:2px 0; color:#555; }
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.tab-btn { padding:10px 20px; background:#ddd; border:none; cursor:pointer; border-radius:5px;}
.tab-btn.active { background:#007bff; color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
input, select, button { padding:10px; margin:5px 0; width:100%; box-sizing:border-box; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#222; color:#fff; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:150px;}
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; padding:15px; border-radius:10px; display:none; z-index:999; }
.holdRow { background:#fff3cd; }
/* ---------- ERP ---------- */
.erp-form { background:#f9f9f9; padding:15px; border-radius:8px; margin-top:10px; }
.erp-table th, .erp-table td { padding:8px; text-align:center; }
.erp-table th { background:#007bff; color:#fff; }
.erp-table td input, .erp-table td select { width:100%; padding:5px; }
.erp-summary { margin-top:10px; font-weight:bold; }
/* ---------- Tasks ---------- */
.task-pending { background:#fff3cd; }
.task-offer { background:#fffbe6; }
.task-follow { background:#ffe0b2; }
.task-order { background:#c8e6c9; }
.task-row td { vertical-align: middle; }
/* ---------- Notif Audio ---------- */
</style>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>
<body>

<div id="notification"></div>
<audio id="notifSound" src="https://www.soundjay.com/buttons/beep-07.wav"></audio>

<div class="container">

<!-- Header -->
<div class="header">
<img src="logo.png" alt="Company Logo">
</div>
<div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>

<!-- Tabs -->
<div class="tabs">
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
<button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
<button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
</div>

<!-- ================= CRM ================= -->
<div id="crmTab" class="tab-content active">
<h2>CRM System</h2>

<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات">
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>
<button onclick="addOrUpdateClient()">💾 حفظ</button>

<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>

<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- ================= Tasks ================= -->
<div id="tasksTab" class="tab-content">
<h2>Tasks</h2>
<div class="row">
<input id="taskText" placeholder="نص المهمة">
<select id="taskType">
<option value="offer">تقديم عرض سعر</option>
<option value="follow">متابعة عرض سعر</option>
<option value="order">أمر توريد</option>
</select>
<input type="date" id="taskDate">
<button onclick="addOrUpdateTask()">➕ حفظ</button>
</div>

<table>
<thead>
<tr>
<th>نص المهمة</th><th>نوع المهمة</th><th>تاريخ المهمة</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="taskTable"></tbody>
</table>
</div>

<!-- ================= ERP ================= -->
<div id="erpTab" class="tab-content">
<h2>ERP</h2>
<div class="erp-form">
<table class="erp-table" id="accountingTable">
<thead>
<tr><th>الحساب</th><th>مدين</th><th>دائن</th></tr>
</thead>
<tbody></tbody>
</table>
<button onclick="addAccountingRow()">+ إضافة سطر</button>
<div class="erp-summary" id="erpSummary">إجمالي الحسابات: 0</div>
</div>
</div>

<!-- ================= Excel ================= -->
<div id="excelTab" class="tab-content">
<h2>Excel</h2>
<input type="file" id="excelFile" accept=".xlsx, .xls" onchange="handleExcelFile(event)">
<button onclick="exportExcelFile()">📊 تصدير</button>
<table id="excelTable"></table>
</div>

</div>

<script>
// ---------- Tabs ----------
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// ---------- Notification ----------
function showNotification(msg){
const n=document.getElementById("notification");
const audio=document.getElementById("notifSound");
n.innerText=msg;
n.style.display="block";
audio.play();
setTimeout(()=>n.style.display="none",3000);
}

// ---------- CRM ----------
let clients = JSON.parse(localStorage.getItem("clients")||"[]");
let editClientIndex=-1;

function addOrUpdateClient(){
const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const date=document.getElementById("date").value;
const status=document.getElementById("status").value;
const notes=document.getElementById("notes").value;
const reminderDays=document.getElementById("reminderDays").value;

if(!name||!phone){ alert("⚠️ أدخل البيانات"); return; }

let reminderDate = reminderDays ? new Date(Date.now() + reminderDays*24*60*60*1000).toISOString() : null;

const clientData={name,phone,date,status,notes,reminderDate};

if(editClientIndex===-1){ clients.push(clientData);}
else{ clients[editClientIndex]=clientData; editClientIndex=-1;}

localStorage.setItem("clients",JSON.stringify(clients));
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
document.getElementById("status").value="";
document.getElementById("notes").value="";
document.getElementById("reminderDays").value="";

renderCRM();
}

function editClient(i){
let c=clients[i];
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
document.getElementById("date").value=c.date;
document.getElementById("status").value=c.status;
document.getElementById("notes").value=c.notes;
editClientIndex=i;
showNotification("✏️ تعديل العميل");
}

function deleteClient(i){ clients.splice(i,1); localStorage.setItem("clients",JSON.stringify(clients)); renderCRM(); }

function openWhatsApp(phone){ window.open(`https://wa.me/${phone}`,'_blank'); }

function renderCRM(){
const table=document.getElementById("table");
table.innerHTML="";
let holdCount=0;
clients.forEach((c,i)=>{
let rowClass=c.status==="Hold"?"holdRow":"";
if(c.status==="Hold"){holdCount++;}
table.innerHTML+=`<tr class="${rowClass}">
<td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td>
<td>${c.notes}</td><td>-</td>
<td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
<td><button onclick="editClient(${i})">✏️</button></td>
<td><button onclick="deleteClient(${i})">❌</button></td>
</tr>`;
});
document.getElementById("total").innerText="Total: "+clients.length;
document.getElementById("hold").innerText="Hold: "+holdCount;
}
renderCRM();

// ---------- Tasks ----------
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let editTaskIndex=-1;

function addOrUpdateTask(){
const text=document.getElementById("taskText").value.trim();
const type=document.getElementById("taskType").value;
const date=document.getElementById("taskDate").value;
if(!text||!date){ alert("⚠️ أدخل البيانات"); return; }

const task={text,type,date};
if(editTaskIndex===-1) tasks.push(task);
else{ tasks[editTaskIndex]=task; editTaskIndex=-1; }

localStorage.setItem("tasks",JSON.stringify(tasks));
document.getElementById("taskText").value="";
document.getElementById("taskDate").value="";
renderTasks();
checkTaskAlerts();
}

function editTask(i){
const t=tasks[i];
document.getElementById("taskText").value=t.text;
document.getElementById("taskType").value=t.type;
document.getElementById("taskDate").value=t.date;
editTaskIndex=i;
showNotification("✏️ تعديل المهمة");
}

function deleteTask(i){ tasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); }

function renderTasks(){
const table=document.getElementById("taskTable");
table.innerHTML="";
tasks.forEach((t,i)=>{
let colorClass="";
if(t.type==="offer") colorClass="task-offer";
else if(t.type==="follow") colorClass="task-follow";
else if(t.type==="order") colorClass="task-order";

table.innerHTML+=`<tr class="task-row ${colorClass}">
<td>${t.text}</td>
<td>${t.type}</td>
<td>${t.date}</td>
<td><button onclick="editTask(${i})">✏️</button></td>
<td><button onclick="deleteTask(${i})">❌</button></td>
</tr>`;
});
}
renderTasks();

// ---------- Task Alerts ----------
function checkTaskAlerts(){
const today=new Date();
tasks.forEach((t)=>{
const taskDate=new Date(t.date);
const diff=Math.floor((taskDate-today)/(1000*60*60*24));
if(diff<=1 && diff>=0){ // الخيار 2
showNotification(`⚠️ مهمة قريبة: ${t.text} (${t.type})`);
}
});
}
checkTaskAlerts();
setInterval(checkTaskAlerts,60*60*1000); // كل ساعة

// ---------- ERP ----------
function addAccountingRow(){
const tbody=document.getElementById("accountingTable").querySelector("tbody");
const newRow=document.createElement("tr");
newRow.innerHTML=`<td>
<select>
<option>الصندوق</option><option>البنك</option><option>المبيعات</option><option>المشتريات</option>
<option>أمدونية</option><option>عهدة</option>
</select>
</td>
<td><input type="number" value="0"></td>
<td><input type="number" value="0"></td>`;
tbody.appendChild(newRow);
updateERP();
}

function updateERP(){
const rows=document.getElementById("accountingTable").querySelectorAll("tbody tr");
let totals={الصندوق:0,البنك:0,المبيعات:0,المشتريات:0,أمدونية:0,عهدة:0};
rows.forEach(r=>{
const account=r.cells[0].querySelector("select").value;
const debit=parseFloat(r.cells[1].querySelector("input").value)||0;
const credit=parseFloat(r.cells[2].querySelector("input").value)||0;
totals[account]+=(debit-credit);
});
let summary="إجمالي الحسابات: ";
for(let key in totals){ summary+=`${key}: ${totals[key]} | `;}
document.getElementById("erpSummary").innerText=summary;
}

// ---------- Excel ----------
function handleExcelFile(e){
const file=e.target.files[0];
if(!file) return;
const reader=new FileReader();
reader.onload=function(evt){
const data=new Uint8Array(evt.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet,{header:1});
renderExcel(json);
};
reader.readAsArrayBuffer(file);
}

function renderExcel(data){
const table=document.getElementById("excelTable");
table.innerHTML="";
data.forEach((row,rIdx)=>{
const tr=document.createElement("tr");
row.forEach((cell,cIdx)=>{
const td=document.createElement("td");
if(rIdx===0){ td.innerText=cell; }
else{ const inp=document.createElement("input"); inp.value=cell; td.appendChild(inp);}
tr.appendChild(td);
});
table.appendChild(tr);
});
}

function exportExcelFile(){
const table=document.getElementById("excelTable");
const wb=XLSX.utils.book_new();
const ws=XLSX.utils.table_to_sheet(table);
XLSX.utils.book_append_sheet(wb,ws,"Sheet1");
XLSX.writeFile(wb,"export.xlsx");
}
</script>

</body>
</html>
