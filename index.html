<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP Modern Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
/* --- Reset & Base --- */
body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7fd; color:#333;}
.container { max-width:1400px; margin:auto; padding:20px; }
/* --- Header --- */
.header { text-align:center; margin-bottom:20px; }
.header h1 { font-size:2rem; color:#0d6efd; }
/* --- Tabs --- */
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;}
.tab-btn { flex:1; padding:12px 20px; background:#e9ecef; border:none; cursor:pointer; border-radius:6px; font-weight:bold; transition:0.3s; }
.tab-btn.active { background:#0d6efd; color:white; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
.tab-content { display:none; animation:fadeIn 0.5s;}
.tab-content.active { display:block; }
/* --- Rows & Forms --- */
.row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;}
.row > * { flex:1; min-width:150px;}
input, select, button { padding:10px; border-radius:6px; border:1px solid #ccc; }
button { cursor:pointer; transition:0.3s; }
button:hover { opacity:0.9; }
/* --- Tables --- */
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:12px; text-align:center; border-bottom:1px solid #ddd; }
th { background:#0d6efd; color:white; }
tr:hover { background:#f1f3f8; }
/* --- ERP Form --- */
.erp-form { background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.erp-btn-add { background:#198754; color:white; border:none; padding:8px 15px; border-radius:5px; margin-top:10px; }
.erp-btn-submit { background:#0d6efd; color:white; border:none; padding:10px 20px; border-radius:5px; margin-top:15px; width:100%; }
/* --- Map --- */
#map { width:100%; height:350px; border-radius:10px; margin-top:15px;}
/* --- Animations --- */
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
</style>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script type="module">
// --- Firebase Setup ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ضع هنا apiKey",
  authDomain: "ضع هنا authDomain",
  projectId: "ضع هنا projectId"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- Tabs Function ---
function showTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// --- CRM Functions ---
const crmListEl = document.getElementById("crmList");
async function addCRM(){
  const name = document.getElementById("crmName").value;
  const phone = document.getElementById("crmPhone").value;
  if(!name) return alert("ادخل اسم العميل");
  await addDoc(collection(db,"clients"), {name, phone, createdAt:new Date()});
  renderCRM();
  document.getElementById("crmName").value="";
  document.getElementById("crmPhone").value="";
}
async function renderCRM(){
  crmListEl.innerHTML="";
  const snapshot = await getDocs(collection(db,"clients"));
  snapshot.forEach(docSnap=>{
    const li = document.createElement("li");
    li.textContent = `${docSnap.data().name} - ${docSnap.data().phone}`;
    crmListEl.appendChild(li);
  });
}

// --- Tasks ---
const taskListEl = document.getElementById("taskList");
async function addTask(){
  const task = document.getElementById("taskInput").value;
  if(!task) return;
  await addDoc(collection(db,"tasks"), {task, createdAt:new Date()});
  renderTasks();
  document.getElementById("taskInput").value="";
}
async function renderTasks(){
  taskListEl.innerHTML="";
  const snapshot = await getDocs(collection(db,"tasks"));
  snapshot.forEach(docSnap=>{
    const li = document.createElement("li");
    li.textContent = docSnap.data().task;
    taskListEl.appendChild(li);
  });
}

// --- ERP ---
const erpTable = document.getElementById("erpTable").querySelector("tbody");
function addERPRow(){
  const tr = document.createElement("tr");
  tr.innerHTML=`<td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option></select></td>
  <td><input type="number" value="0"></td><td><input type="number" value="0"></td>
  <td><button onclick="deleteERPRow(this)">🗑 حذف</button></td>`;
  erpTable.appendChild(tr);
}
function deleteERPRow(btn){ btn.closest("tr").remove(); }
async function saveERP(){
  let entries=[];
  erpTable.querySelectorAll("tr").forEach(tr=>{
    const account = tr.cells[0].querySelector("select").value;
    const debit = tr.cells[1].querySelector("input").value;
    const credit = tr.cells[2].querySelector("input").value;
    entries.push({account,debit,credit});
  });
  await addDoc(collection(db,"erpEntries"), {entries, createdAt:new Date()});
  alert("تم حفظ القيد بنجاح");
}

// --- Excel ---
function handleFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload=function(evt){
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet,{header:1});
    renderExcel(json);
  }
  reader.readAsArrayBuffer(file);
}
function renderExcel(data){
  const table = document.getElementById("excelTable");
  table.innerHTML="";
  data.forEach(row=>{
    const tr=document.createElement("tr");
    row.forEach(cell=>{
      const td=document.createElement("td");
      td.innerText = cell;
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}
function exportExcelFile(){
  const table = document.getElementById("excelTable");
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.table_to_sheet(table);
  XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
  XLSX.writeFile(wb, "export.xlsx");
}

// --- Map ---
let map = L.map('map').setView([30.0444,31.2357],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
let marker = L.marker([30.0444,31.2357],{draggable:true}).addTo(map);
marker.on('dragend', e=>{ const pos=marker.getLatLng(); });
map.on('click', e=>{ marker.setLatLng(e.latlng); });

// --- Init ---
renderCRM();
renderTasks();
</script>
</head>
<body>
<div class="container">
<div class="header">
<h1>CRM & ERP Dashboard</h1>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
<button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
<button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
</div>

<!-- CRM -->
<div id="crmTab" class="tab-content active">
<div class="row">
<input id="crmName" placeholder="اسم العميل">
<input id="crmPhone" placeholder="رقم الهاتف">
<button onclick="addCRM()">💾 حفظ</button>
</div>
<ul id="crmList"></ul>
</div>

<!-- Tasks -->
<div id="tasksTab" class="tab-content">
<div class="row">
<input id="taskInput" placeholder="اكتب المهمة">
<button onclick="addTask()">➕ إضافة المهمة</button>
</div>
<ul id="taskList"></ul>
</div>

<!-- ERP -->
<div id="erpTab" class="tab-content">
<div class="erp-form">
<table id="erpTable">
<thead><tr><th>الحساب</th><th>مدين</th><th>دائن</th><th>إجراء</th></tr></thead>
<tbody>
<tr>
<td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option></select></td>
<td><input type="number" value="0"></td>
<td><input type="number" value="0"></td>
<td><button onclick="deleteERPRow(this)">🗑 حذف</button></td>
</tr>
</tbody>
</table>
<button class="erp-btn-add" onclick="addERPRow()">+ إضافة سطر</button>
<button class="erp-btn-submit" onclick="saveERP()">💾 حفظ القيد</button>
</div>
<div id="map"></div>
</div>

<!-- Excel -->
<div id="excelTab" class="tab-content">
<input type="file" id="excelFile" onchange="handleFile(event)">
<button onclick="exportExcelFile()">📊 تصدير Excel</button>
<table id="excelTable" border="1"></table>
</div>

</div>
</body>
</html>
