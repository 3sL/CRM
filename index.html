<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
.stats { display:flex; gap:10px; flex-wrap:wrap; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px;}
#map { height:300px; margin-top:10px;}
.holdRow { background:#fff3cd; }

#notification {
position:fixed;
top:20px;
right:20px;
background:#ffcc00;
padding:15px;
border-radius:10px;
display:none;
z-index:999;
font-weight:bold;
}
</style>

</head>

<body>

<div id="notification"></div>

<div class="container">

<h2>CRM System</h2>

<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">

<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>

<input id="notes" placeholder="ملاحظات">
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>

<div class="row">
<button onclick="startTracking()">📍 تتبع</button>
<button onclick="stopTracking()">⛔ إيقاف</button>
<button onclick="addOrUpdate()">💾 حفظ</button>
</div>

<div class="stats">
<div class="card" id="total">Total: 0</div>
<div class="card" id="hold">Hold: 0</div>
</div>

<div id="map"></div>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>التاريخ</th>
<th>الحالة</th>
<th>ملاحظات</th>
<th>Reminder</th>
<th>واتساب</th>
<th>الموقع</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// 🔥 Firebase (زي ما هو بدون تغيير)
const firebaseConfig = {
  apiKey: "AIzaSyBug4T4JIrLRCv6dNm7vdSFMD-KFC6mI0g",
  authDomain: "crm-app-7733a.firebaseapp.com",
  projectId: "crm-app-7733a",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db,"clients");

// عناصر
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const agentEl=document.getElementById("agent");
const reminderEl=document.getElementById("reminderDays");
const table=document.getElementById("table");

// 🔔 Notification
function showNotification(msg){
  const n=document.getElementById("notification");
  n.innerText=msg;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",3000);
}

// 🗺️ MAP
let map=L.map('map').setView([30.0444,31.2357],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker=L.marker([30.0444,31.2357],{draggable:true}).addTo(map);
let currentLocation=null;

marker.on('dragend', e=>{
  const p=marker.getLatLng();
  currentLocation={lat:p.lat,lng:p.lng};
});

map.on('click', e=>{
  marker.setLatLng(e.latlng);
  currentLocation={lat:e.latlng.lat,lng:e.latlng.lng};
});

// 📍 tracking
let watchId;
window.startTracking=()=> {
  watchId=navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    currentLocation={lat,lng};
    marker.setLatLng([lat,lng]);
    map.setView([lat,lng],13);
  });
}
window.stopTracking=()=> navigator.geolocation.clearWatch(watchId);

// ➕ ADD
window.addOrUpdate=async ()=>{
  if(!nameEl.value || !phoneEl.value){
    alert("أدخل الاسم ورقم الهاتف");
    return;
  }

  const now=new Date();
  const reminderDate = reminderEl.value
    ? new Date(now.getTime()+reminderEl.value*86400000)
    : null;

  await addDoc(colRef,{
    name:nameEl.value,
    phone:phoneEl.value,
    date:dateEl.value,
    status:statusEl.value,
    notes:notesEl.value,
    agent:agentEl.value,
    location:currentLocation,
    reminderDate: reminderDate ? reminderDate.toISOString() : null
  });

  clearForm();
  render();
}

// 🧹
function clearForm(){
  nameEl.value="";
  phoneEl.value="";
  dateEl.value="";
  notesEl.value="";
  agentEl.value="";
  reminderEl.value="";
}

// 🗑️
window.deleteClient=async(id)=>{
  await deleteDoc(doc(db,"clients",id));
  render();
}

// 📱 WhatsApp
function openWhatsApp(phone){
  let msg="مرحبا، بخصوص الطلب الخاص بك";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// ⏰ Reminder
function checkReminder(c){
  if(!c.reminderDate) return "";

  const now=new Date();
  const r=new Date(c.reminderDate);

  if(now>=r){
    showNotification("⏰ متابعة مطلوبة: "+c.name);
    return "⚠️ Reminder";
  }
  return "";
}

// 🎨 RENDER
async function render(){
  table.innerHTML="";
  let holdCount=0;

  const snap=await getDocs(colRef);

  snap.forEach(d=>{
    const c=d.data();

    let rowClass=c.status==="Hold"?"holdRow":"";

    if(c.status==="Hold"){
      holdCount++;
      showNotification("⚠️ شغل متوقف: "+c.name);
    }

    let reminderMsg=checkReminder(c);

    table.innerHTML+=`
    <tr class="${rowClass}">
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.date}</td>
      <td>${c.status}</td>
      <td>${c.notes}</td>
      <td>${reminderMsg}</td>
      <td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
      <td>${c.location ? `<a href="https://maps.google.com/?q=${c.location.lat},${c.location.lng}" target="_blank">🌍</a>`:"-"}</td>
      <td><button onclick="deleteClient('${d.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("total").innerText="Total: "+snap.size;
  document.getElementById("hold").innerText="Hold: "+holdCount;
}

// INIT
render();

</script>

</body>
</html>
