<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM Teams - GPS + Excel + Stats</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
button { cursor:pointer; }
.lang-btn { width:auto; margin-bottom:15px;}
.stats { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:150px;}
</style>
</head>

<body>
<div class="container">

<button class="lang-btn" onclick="toggleLang()">🌐 عربي / English</button>

<h2 id="title">📊 نظام إدارة العملاء - فرق المبيعات</h2>

<!-- اختيار المندوب -->
<div class="row">
<select id="agentFilter" onchange="render()">
  <option value="">كل المندوبين</option>
  <option value="Ahmed">Ahmed</option>
  <option value="Sara">Sara</option>
  <option value="Ali">Ali</option>
</select>
</div>

<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات">
<select id="agent">
  <option value="Ahmed">Ahmed</option>
  <option value="Sara">Sara</option>
  <option value="Ali">Ali</option>
</select>
</div>

<div class="row">
<button onclick="startTracking()">📍 بدء التتبع</button>
<button onclick="stopTracking()">⛔ إيقاف</button>
<button onclick="addOrUpdate()">💾 حفظ</button>
<button onclick="exportExcel()">📊 Excel</button>
</div>

<div class="stats">
<div class="card" id="total">👥 إجمالي: 0</div>
<div class="card" id="interested">🎯 مهتم: 0</div>
<div class="card" id="working">🔧 قيد التنفيذ: 0</div>
<div class="card" id="done">✅ مكتمل: 0</div>
</div>

<div id="map" style="height:300px;margin-top:15px;"></div>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>التاريخ</th>
<th>الحالة</th>
<th>ملاحظات</th>
<th>مندوب</th>
<th>الموقع</th>
<th>المسافة</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBug4T4JIrLRCv6dNm7vdSFMD-KFC6mI0g",
  authDomain: "crm-app-7733a.firebaseapp.com",
  projectId: "crm-app-7733a",
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db,"clients");

// MAP
let map = L.map('map').setView([30.0444,31.2357], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);
let marker = L.marker([30.0444,31.2357]).addTo(map);

// TRACKING
let watchId;
let currentLocation = null;

function startTracking(){
  watchId = navigator.geolocation.watchPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    currentLocation = {lat,lng};
    map.setView([lat,lng], 13);
    marker.setLatLng([lat,lng]);
  });
}
function stopTracking(){ navigator.geolocation.clearWatch(watchId); }

// DISTANCE
function calcDistance(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(2);
}

// ADD
async function addOrUpdate(){
  if(!name.value || !phone.value){
    alert("أدخل الاسم ورقم الهاتف");
    return;
  }
  await addDoc(colRef,{
    name:name.value,
    phone:phone.value,
    date:date.value,
    status:status.value,
    notes:notes.value,
    location:currentLocation,
    agent:agent.value
  });
  render();
}

// RENDER
async function render(){
  table.innerHTML="";
  let total=0, interested=0, working=0, done=0;
  const filterAgent=agentFilter.value;

  const snap=await getDocs(colRef);
  snap.forEach(d=>{
    const c=d.data();
    if(filterAgent && c.agent!==filterAgent) return;

    // العدادات
    total++;
    if(c.status==="Interested") interested++;
    else if(c.status==="In Progress") working++;
    else if(c.status==="Completed") done++;

    let dist = c.location && currentLocation
      ? calcDistance(currentLocation.lat,currentLocation.lng,c.location.lat,c.location.lng)+" كم"
      : "-";

    table.innerHTML+=`
    <tr>
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.date}</td>
      <td>${c.status}</td>
      <td>${c.notes}</td>
      <td>${c.agent}</td>
      <td>${c.location ? `<a href="https://maps.google.com/?q=${c.location.lat},${c.location.lng}" target="_blank">🌍 فتح</a>` : "-"}</td>
      <td>${dist}</td>
      <td><button onclick="deleteClient('${d.id}')">❌</button></td>
    </tr>`;
  });

  totalEl.innerText=`👥 إجمالي: ${total}`;
  interestedEl.innerText=`🎯 مهتم: ${interested}`;
  workingEl.innerText=`🔧 قيد التنفيذ: ${working}`;
  doneEl.innerText=`✅ مكتمل: ${done}`;
}

// DELETE
async function deleteClient(id){ await deleteDoc(doc(db,"clients",id)); render(); }

// EXCEL
async function exportExcel(){
  const snap=await getDocs(colRef);
  let csv="Name,Phone,Date,Status,Notes,Agent,Lat,Lng\n";
  snap.forEach(d=>{
    const c=d.data();
    csv+=`${c.name},${c.phone},${c.date},${c.status},${c.notes},${c.agent},${c.location?.lat||""},${c.location?.lng||""}\n`;
  });
  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="clients.csv";
  a.click();
}

// LANGUAGE
let lang="ar";
function toggleLang(){
  lang = lang==="ar" ? "en" : "ar";
  document.documentElement.dir = lang==="ar" ? "rtl" : "ltr";
  if(lang==="en"){
    title.innerText="📊 CRM System - Teams";
    name.placeholder="Customer Name";
    phone.placeholder="Phone";
    notes.placeholder="Notes";
    totalEl.innerText="👥 Total: 0";
    interestedEl.innerText="🎯 Interested: 0";
    workingEl.innerText="🔧 In Progress: 0";
    doneEl.innerText="✅ Completed: 0";
  }else{
    title.innerText="📊 نظام إدارة العملاء - فرق المبيعات";
    name.placeholder="اسم العميل";
    phone.placeholder="رقم الهاتف";
    notes.placeholder="ملاحظات";
  }
}

// GLOBAL
const name=document.getElementById("name");
const phone=document.getElementById("phone");
const date=document.getElementById("date");
const status=document.getElementById("status");
const notes=document.getElementById("notes");
const agent=document.getElementById("agent");
const agentFilter=document.getElementById("agentFilter");

const table=document.getElementById("table");
const totalEl=document.getElementById("total");
const interestedEl=document.getElementById("interested");
const workingEl=document.getElementById("working");
const doneEl=document.getElementById("done");

window.startTracking=startTracking;
window.stopTracking=stopTracking;
window.addOrUpdate=addOrUpdate;
window.deleteClient=deleteClient;
window.exportExcel=exportExcel;
window.toggleLang=toggleLang;

render();

</script>
</body>
</html>
