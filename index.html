<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System</title>

<style>
body { font-family: Arial; background:#f0f2f5; padding:20px;}
.container { max-width:1200px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
input, select, button { padding:10px; margin:5px; width:100%; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; margin-top:20px; border-collapse: collapse;}
th, td { padding:10px; border:1px solid #ddd; text-align:center;}
th { background:#222; color:#fff;}
.stats { display:flex; gap:10px; flex-wrap:wrap; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px;}
#notification {
  position: fixed;
  top:20px;
  right:20px;
  background:#ffcc00;
  padding:15px;
  border-radius:10px;
  display:none;
  z-index:999;
}
.holdRow { background:#fff3cd; }
</style>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="notification"></div>

<div class="container">

<h2>CRM System</h2>

<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات">
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>

<div class="row">
<button onclick="addOrUpdate()">💾 حفظ</button>
</div>

<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الهاتف</th>
<th>التاريخ</th>
<th>الحالة</th>
<th>ملاحظات</th>
<th>Reminder</th>
<th>واتساب</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>
// STORAGE
let clients = JSON.parse(localStorage.getItem("clients") || "[]");

// عناصر
const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const dateEl = document.getElementById("date");
const statusEl = document.getElementById("status");
const notesEl = document.getElementById("notes");
const reminderEl = document.getElementById("reminderDays");
const table = document.getElementById("table");

// 🔔 Notification
function showNotification(msg){
  const n = document.getElementById("notification");
  n.innerText = msg;
  n.style.display="block";
  setTimeout(()=> n.style.display="none",3000);
}

// ➕ إضافة
function addOrUpdate(){
  if(!nameEl.value || !phoneEl.value){
    alert("أدخل البيانات");
    return;
  }

  const now = new Date();
  const reminderDate = reminderEl.value
    ? new Date(now.getTime() + reminderEl.value*24*60*60*1000)
    : null;

  clients.push({
    name:nameEl.value,
    phone:phoneEl.value,
    date:dateEl.value,
    status:statusEl.value,
    notes:notesEl.value,
    reminderDate: reminderDate ? reminderDate.toISOString() : null
  });

  localStorage.setItem("clients", JSON.stringify(clients));

  clearForm();
  render();
}

// 🧹
function clearForm(){
  nameEl.value="";
  phoneEl.value="";
  dateEl.value="";
  notesEl.value="";
  reminderEl.value="";
}

// 🗑️
function deleteClient(i){
  clients.splice(i,1);
  localStorage.setItem("clients", JSON.stringify(clients));
  render();
}

// 📱 واتساب
function openWhatsApp(phone){
  let msg = "مرحبا، بخصوص الطلب الخاص بك";
  window.open(https://wa.me/${phone}?text=${encodeURIComponent(msg)},'_blank');
}

// ⏰ Check Reminder
function checkReminder(client){
  if(!client.reminderDate) return "";

  const now = new Date();
  const rDate = new Date(client.reminderDate);

  if(now >= rDate){
    showNotification("⏰ عندك عميل محتاج متابعة: " + client.name);
    return "⚠️ Reminder!";
  }
  return "";
}

// 🎨 عرض
function render(){
  table.innerHTML="";
  let holdCount=0;

  clients.forEach((c,i)=>{

    let rowClass = c.status==="Hold" ? "holdRow" : "";

    if(c.status==="Hold"){
      holdCount++;
      showNotification("⚠️ في شغل Hold: " + c.name);
    }

    let reminderMsg = checkReminder(c);

    table.innerHTML += `
    <tr class="${rowClass}">
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.date}</td>
      <td>${c.status}</td>
      <td>${c.notes}</td>
      <td>${reminderMsg}</td>
      <td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
      <td><button onclick="deleteClient(${i})">❌</button></td>
    </tr>
    `;
  });

  document.getElementById("total").innerText="Total: "+clients.length;
  document.getElementById("hold").innerText="Hold: "+holdCount;
}

// INIT
render();
</script>

</body>
