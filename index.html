<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System</title>

<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0; }
.container { max-width:1400px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.15);}
.header { text-align:center; margin-bottom:20px; }
.header img { height:120px; width:auto; margin-bottom:10px; }
.developer, .phone { text-align:center; font-size:14px; margin:2px 0; color:#555; }
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.tab-btn { padding:10px 20px; background:#ddd; border:none; cursor:pointer; border-radius:5px; transition:0.3s; }
.tab-btn:hover { background:#bbb; }
.tab-btn.active { background:#007bff; color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
input, select, button { padding:10px; margin:5px 0; width:100%; box-sizing:border-box; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; min-width:150px; }
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#222; color:#fff; }
.stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
.card { flex:1; background:#eee; padding:10px; text-align:center; border-radius:8px; min-width:150px;}
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; padding:15px; border-radius:10px; display:none; z-index:999; font-weight:bold; }
.holdRow { background:#fff3cd; }
.erp-form { background:#f9f9f9; padding:15px; border-radius:8px; margin-top:10px; }
.erp-summary { margin-top:10px; font-weight:bold; background:#e0e0e0; padding:10px; border-radius:8px; }
.task-pending { background:#ffecb3; }
.task-offer { background:#ffe0b2; }
.task-follow { background:#c8e6c9; }
.task-order { background:#b3e5fc; }
</style>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
<div id="notification"></div>
<div class="container">

<div class="header">
<img src="logo.png" alt="Company Logo">
</div>
<div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
<button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
<button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
</div>

<!-- CRM -->
<div id="crmTab" class="tab-content active">
<h2>CRM System</h2>
<div class="row">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">
<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>
<input id="notes" placeholder="ملاحظات">
<input id="agent" placeholder="اسم المندوب">
<input type="number" id="reminderDays" placeholder="Reminder بالأيام">
</div>
<button onclick="addOrUpdate()">💾 حفظ</button>
<div class="stats">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>التاريخ</th><th>الحالة</th>
<th>ملاحظات</th><th>Reminder</th><th>واتساب</th><th>تعديل</th><th>حذف</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- Tasks -->
<div id="tasksTab" class="tab-content">
<h2>Tasks</h2>
<div class="row">
<input id="taskClient" placeholder="اسم العميل">
<input id="taskInput" placeholder="نص المهمة">
<select id="taskType">
<option value="pending">تقديم عرض سعر</option>
<option value="follow">متابعة عرض السعر</option>
<option value="order">أمر توريد</option>
</select>
<button onclick="addTask()">➕ إضافة مهمة</button>
</div>
<ul id="taskList"></ul>
</div>

<!-- ERP -->
<div id="erpTab" class="tab-content">
<h2>ERP</h2>
<div class="erp-form">
<table id="accountingTable">
<thead><tr><th>الحساب</th><th>مدين</th><th>دائن</th></tr></thead>
<tbody>
<tr>
<td>
<select>
<option>الصندوق</option>
<option>البنك</option>
<option>المبيعات</option>
<option>المشتريات</option>
<option>المديونية</option>
<option>العهدة</option>
</select>
</td>
<td><input type="number" placeholder="0.00"></td>
<td><input type="number" placeholder="0.00"></td>
</tr>
</tbody>
</table>
<button onclick="addAccountingRow()">+ إضافة سطر</button>
<div class="erp-summary" id="erpSummary">ERP Summary: -</div>
</div>
</div>

<!-- Excel -->
<div id="excelTab" class="tab-content">
<h2>Excel Upload / Edit</h2>
<input type="file" id="excelFile" accept=".xlsx, .xls" onchange="handleExcelFile(event)">
<button onclick="exportExcelFile()">📊 تصدير Excel</button>
<table id="excelTable" border="1"></table>
</div>

</div>

<script>
// ---- Tabs ----
function showTab(id, btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// ---- Notification + Sound ----
function showNotification(msg){
const n=document.getElementById("notification");
n.innerText=msg;
n.style.display="block";
document.getElementById("notifSound").play();
setTimeout(()=>n.style.display="none",3000);
}

// ---- CRM ----
let clients=JSON.parse(localStorage.getItem("clients")||"[]");
let editIndex=-1;
function addOrUpdate(){
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const dateEl=document.getElementById("date");
const statusEl=document.getElementById("status");
const notesEl=document.getElementById("notes");
const reminderEl=document.getElementById("reminderDays");
if(!nameEl.value.trim() || !phoneEl.value.trim()){ alert("⚠️ أدخل البيانات"); return; }
const clientData={name:nameEl.value,phone:phoneEl.value,date:dateEl.value,status:statusEl.value,notes:notesEl.value};
if(editIndex===-1){ clients.push(clientData); showNotification("✅ تم إضافة العميل"); } 
else { clients[editIndex]=clientData; editIndex=-1; showNotification("✏️ تم تعديل العميل"); }
localStorage.setItem("clients",JSON.stringify(clients));
nameEl.value=""; phoneEl.value=""; dateEl.value=""; notesEl.value=""; reminderEl.value="";
renderCRM();
}
function editClient(i){
const c=clients[i];
document.getElementById("name").value=c.name;
document.getElementById("phone").value=c.phone;
document.getElementById("date").value=c.date;
document.getElementById("status").value=c.status;
document.getElementById("notes").value=c.notes;
editIndex=i;
showNotification("✏️ تعديل العميل");
}
function deleteClient(i){ clients.splice(i,1); localStorage.setItem("clients",JSON.stringify(clients)); renderCRM(); showNotification("❌ تم حذف العميل"); }
function openWhatsApp(phone){ window.open(`https://wa.me/${phone}`,'_blank'); }
function renderCRM(){
const table=document.getElementById("table"); table.innerHTML=""; let holdCount=0;
clients.forEach((c,i)=>{
let rowClass=c.status==="Hold"?"holdRow":"";
if(c.status==="Hold"){ holdCount++; }
table.innerHTML+=`<tr class="${rowClass}">
<td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td>
<td>${c.notes}</td><td>-</td>
<td><button onclick="openWhatsApp('${c.phone}')">📱</button></td>
<td><button onclick="editClient(${i})">✏️</button></td>
<td><button onclick="deleteClient(${i})">❌</button></td>
</tr>`;
});
document.getElementById("total").innerText="Total: "+clients.length;
document.getElementById("hold").innerText="Hold: "+holdCount;
}
renderCRM();

// ---- Tasks ----
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
function addTask(){
const client=document.getElementById("taskClient").value.trim();
const text=document.getElementById("taskInput").value.trim();
const type=document.getElementById("taskType").value;
if(!client || !text){ alert("⚠️ أدخل بيانات المهمة"); return; }
tasks.push({client,text,type});
localStorage.setItem("tasks",JSON.stringify(tasks));
document.getElementById("taskClient").value=""; document.getElementById("taskInput").value="";
showNotification("✅ تم إضافة مهمة");
renderTasks();
}
function editTask(i){
document.getElementById("taskClient").value=tasks[i].client;
document.getElementById("taskInput").value=tasks[i].text;
document.getElementById("taskType").value=tasks[i].type;
tasks.splice(i,1);
showNotification("✏️ تعديل المهمة");
renderTasks();
}
function deleteTask(i){ tasks.splice(i,1); localStorage.setItem("tasks",JSON.stringify(tasks)); renderTasks(); showNotification("❌ تم حذف المهمة"); }
function renderTasks(){
const list=document.getElementById("taskList"); list.innerHTML="";
tasks.forEach((t,i)=>{
let cls=t.type==="pending"?"task-pending":t.type==="follow"?"task-follow":"task-order";
list.innerHTML+=`<li class="${cls}">${t.client} - ${t.text} [${t.type}]
<button onclick="editTask(${i})">✏️</button>
<button onclick="deleteTask(${i})">❌</button></li>`;
});
}
renderTasks();

// ---- ERP ----
function addAccountingRow(){
const tbody=document.getElementById("accountingTable").querySelector("tbody");
const newRow=document.createElement("tr");
newRow.innerHTML=`<td>
<select>
<option>الصندوق</option>
<option>البنك</option>
<option>المبيعات</option>
<option>المشتريات</option>
<option>المديونية</option>
<option>العهدة</option>
</select>
</td><td><input type="number" placeholder="0.00"></td><td><input type="number" placeholder="0.00"></td>`;
tbody.appendChild(newRow);
updateERP();
showNotification("✅ تم إضافة سطر ERP");
}
function updateERP(){
const rows=document.getElementById("accountingTable").querySelectorAll("tbody tr");
let totals={الصندوق:0, البنك:0, المبيعات:0, المشتريات:0, المديونية:0, العهدة:0};
rows.forEach(r=>{
const account=r.cells[0].querySelector("select").value;
const debit=parseFloat(r.cells[1].querySelector("input").value)||0;
const credit=parseFloat(r.cells[2].querySelector("input").value)||0;
totals[account]+=(debit-credit);
if(debit-credit<0){ showNotification(`⚠️ رصيد سلبي في ${account}`); }
});
let summary="ERP Summary: ";
for(let key in totals){ summary+=`${key}: ${totals[key]} | `;}
document.getElementById("erpSummary").innerText=summary;
}
document.getElementById("accountingTable").addEventListener("input",updateERP);

// ---- Excel ----
function handleExcelFile(event){
const file=event.target.files[0]; if(!file) return;
const reader=new FileReader();
reader.onload=function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const firstSheetName=workbook.SheetNames[0];
const worksheet=workbook.Sheets[firstSheetName];
const html=XLSX.utils.sheet_to_html(worksheet);
document.getElementById("excelTable").innerHTML=html;
showNotification("✅ تم استيراد ملف Excel");
};
reader.readAsArrayBuffer(file);
}
function exportExcelFile(){
const wb=XLSX.utils.book_new();
const ws=XLSX.utils.table_to_sheet(document.getElementById("excelTable"));
XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
XLSX.writeFile(wb,"export.xlsx");
showNotification("✅ تم تصدير ملف Excel");
}

</script>
</body>
</html>
