<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM & ERP System - Utopia Trading & Export</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* General Styles */
body {
  font-family: 'Roboto', sans-serif;
  background-color: #f7f8fa;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1200px;
  margin: 30px auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
}

/* Header Section */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.header img {
  width: 180px;
  margin-bottom: 15px;
}

.developer {
  font-size: 14px;
  color: #777;
}

.phone {
  font-size: 14px;
  color: #555;
}

h2 {
  color: #333;
  font-size: 24px;
  margin-bottom: 10px;
}

/* Tab Button Styling */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab-btn {
  padding: 10px 20px;
  background: #f0f1f6;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  font-weight: 500;
  transition: background 0.3s ease;
}

.tab-btn.active {
  background: #007bff;
  color: #fff;
}

.tab-btn:hover {
  background: #007bff;
  color: #fff;
}

/* Form Elements */
input, select, button {
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}

input[type="number"], input[type="date"] {
  max-width: 150px;
}

/* Table Styling */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border: 1px solid #ddd;
  text-align: center;
}

th {
  background: #007bff;
  color: #fff;
}

button {
  cursor: pointer;
  transition: background 0.3s ease;
}

button:hover {
  background: #f0f1f6;
}

/* Stats Section */
.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.card {
  background: #f1f1f1;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  min-width: 120px;
  box-sizing: border-box;
}

.card h3 {
  margin: 0;
  font-size: 16px;
}

/* Notifications */
#notification {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #ffcc00;
  padding: 15px;
  border-radius: 8px;
  display: none;
  z-index: 1000;
  font-size: 14px;
  font-weight: 500;
}

/* Responsive Design */
@media (max-width: 768px) {
  .container {
    padding: 15px;
  }

  .tabs {
    flex-direction: column;
  }

  .tab-btn {
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header Section -->
  <div class="header">
    <img src="logo.png" alt="Company Logo" class="logo">
    <h2>CRM & ERP System</h2>
    <div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
    <div class="phone">📞 +201222153415</div>
  </div>

  <!-- Language Toggle -->
  <button class="lang-btn" onclick="toggleLang()">🌐 عربي / English</button>

  <!-- Tabs Section -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
    <button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
    <button class="tab-btn" onclick="showTab('erpTab', this)">ERP</button>
    <button class="tab-btn" onclick="showTab('excelTab', this)">Excel</button>
  </div>

  <!-- CRM Tab -->
  <div id="crmTab" class="tab-content active">
    <div id="notification"></div>

    <!-- CRM Form -->
    <div class="row">
      <input id="name" placeholder="اسم العميل">
      <input id="phone" placeholder="رقم الهاتف">
      <input type="date" id="date">
      <select id="status">
        <option>Interested</option>
        <option>In Progress</option>
        <option>Hold</option>
        <option>Completed</option>
      </select>
      <input id="notes" placeholder="ملاحظات">
      <input id="agent" placeholder="اسم المندوب">
      <input type="number" id="reminderDays" placeholder="Reminder بالأيام">
    </div>

    <div class="row">
      <button onclick="addOrUpdate()">💾 حفظ</button>
    </div>

    <!-- Stats Section -->
    <div class="stats">
      <div class="card" id="total">Total: 0</div>
      <div class="card" id="hold">Hold: 0</div>
    </div>

    <!-- Table Section -->
    <table>
      <thead>
        <tr>
          <th>الاسم</th>
          <th>الهاتف</th>
          <th>التاريخ</th>
          <th>الحالة</th>
          <th>ملاحظات</th>
          <th>Reminder</th>
          <th>واتساب</th>
          <th>تعديل</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <!-- Tasks Tab -->
  <div id="tasksTab" class="tab-content">
    <h3>My Tasks</h3>
    <div class="row">
      <input id="taskInput" placeholder="اكتب المهمة">
      <button onclick="addTask()">➕ إضافة المهمة</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <!-- ERP Tab -->
  <div id="erpTab" class="tab-content">
    <h3>ERP System & Accounting Entry</h3>
    <div class="erp-form">
      <form id="accountingForm">
        <div class="row">
          <div class="form-group">
            <label>التاريخ:</label>
            <input type="date" name="accDate" required>
          </div>
          <div class="form-group">
            <label>البيان (الوصف):</label>
            <input type="text" name="accDesc" placeholder="شرح القيد">
          </div>
        </div>

        <table id="accountingTable">
          <thead>
            <tr>
              <th>الحساب</th>
              <th>مدين</th>
              <th>دائن</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option></select></td>
              <td><input type="number" placeholder="0.00"></td>
              <td><input type="number" placeholder="0.00"></td>
            </tr>
            <tr>
              <td><select><option>الصندوق</option><option>البنك</option><option>المبيعات</option></select></td>
              <td><input type="number" placeholder="0.00"></td>
              <td><input type="number" placeholder="0.00"></td>
            </tr>
          </tbody>
        </table>
        <button type="button" class="erp-btn-add" onclick="addAccountingRow()">+ إضافة سطر</button>
        <button type="button" class="erp-btn-submit" onclick="submitAccountingForm()">حفظ القيد</button>
      </form>
    </div>
  </div>

  <!-- Excel Tab -->
  <div id="excelTab" class="tab-content">
    <h3>Excel Upload / Edit</h3>
    <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="handleFile(event)">
    <button onclick="exportExcelFile()">📊 تصدير Excel</button>
    <table id="excelTable" border="1"></table>
  </div>
</div>

<script>

  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const db = getFirestore(app);
const clientsRef = collection(db, "clients");

// Firebase Logic (and other functions you need)...
</script>

</body>
</html>
